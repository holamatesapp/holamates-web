<style>
:root{
  --panel:#111824;
  --panel2:#0f1622;
  --text:#e8eef7;

}

*{box-sizing:border-box}
html,body{height:100%}

body{

.app{

}

@media (min-width:600px){

/* ───────── HEADER / NAV ───────── */

header{
  padding:16px 18px 10px;
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid rgba(255,255,255,.06);
  align-items:center;
}

.stats{
  display:flex;
  gap:10px;
}

.pill{
  font-size:12px;
  color:var(--muted);
  background:rgba(255,255,255,.06);
  padding:6px 10px;
  border-radius:999px;
  display:flex;
  align-items:center;
  gap:6px;
}

select{
  appearance:none;
  -webkit-appearance:none;
  -moz-appearance:none;

  background:transparent;
  border:none;
  outline:none;

  color:var(--text);
  font-weight:600;
  cursor:pointer;

}

select option{
  background:#1f2937;
  color:#ffffff;
}

select:disabled{
  opacity:.6;
  cursor:default;
}

.player2 select{
  pointer-events:none;
  opacity:.7;
}


/* menú de juegos */

.game-switch{
  position:relative;
}

#gameBtn{
  background:none;
  border:none;
  color:var(--text);
  font-size:18px;
  font-weight:800;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:4px;
}

#gameBtn .arrow{
  font-size:14px;
  opacity:.6;
}

.game-menu{
  position:absolute;
  top:calc(100% + 8px);
  left:0;
  background:#0c121c;
  border-radius:12px;
  padding:6px;
  display:none;
  box-shadow:0 12px 40px rgba(0,0,0,.5);
  z-index:20;
  min-width:140px;
}

.game-menu a{
  display:block;
  padding:8px 12px;
  text-decoration:none;
  color:var(--text);
  font-size:14px;
  border-radius:8px;
  white-space:nowrap;
}

.game-menu a:hover{
  background:rgba(255,255,255,.08);
}

.game-menu .current{
  display:block;
  padding:8px 12px;
  font-size:14px;
  border-radius:8px;
  white-space:nowrap;
  opacity:.45;
  cursor:default;
}
.game-menu.show{ display:block }

/* ───────── LÍNEA DE TIEMPO ───────── */

.timeline{
  position: relative;
  width: 100%;
  height: 6px;
  background: rgba(255,255,255,.15);
  border-radius: 999px;
  overflow: hidden;
  margin-top: -6px;
  margin-bottom: 12px; /* separación con la calculadora */
}

.timeline-bar{
  position: absolute;
  right: 0;           /* anclada a la derecha */
  top: 0;
  height: 100%;
  width: 0%;
background: linear-gradient(90deg, #4ade80, #22c55e);
  transition: width .1s linear, background .2s;
}

/* estado final */
.timeline-bar.fail{
  background: linear-gradient(90deg, #dc2626, #991b1b);
}


/* ───────── PANTALLA ───────── */

.screen{ padding:18px }

.display{
  background:rgba(0,0,0,.25);
  border-radius:14px;
  min-height:90px;
  padding:14px;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

.number{
  display:flex;
  gap:var(--digit-gap);
  width:100%;
}

.digit{
  flex:1;
  min-width:0;   /* importante para flex */
  height:56px;
  border-radius:18px;
  background:rgba(255,255,255,.12);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size: clamp(14px, 2.2vw, 22px);
  white-space: nowrap;
  font-weight:800;
  transition:.15s;
}

.digit.empty{ opacity:.25 }
.digit.active{ background:var(--active); color:#fff }
.digit.fail{ background:var(--fail); color:#fff }

.digit.consume{
  animation:consume .14s ease-out forwards;
}

@keyframes consume{
  to{ transform:scale(.4) translateY(20px); opacity:0 }
}

.display.shake{
  animation:shake .18s linear;
}

@keyframes shake{
  0%{transform:translateX(0)}
  20%{transform:translateX(-4px)}
  40%{transform:translateX(4px)}
  60%{transform:translateX(-3px)}
  80%{transform:translateX(3px)}
  100%{transform:translateX(0)}
}

/* ───────── TECLADO ───────── */

.kbd{
  padding:18px;
  margin-top:auto;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

button.key{
  height:70px;
  font-size:22px;
  font-weight:800;
  border-radius:16px;
  background:linear-gradient(180deg,var(--btn),var(--btn2));
  border:1px solid rgba(255,255,255,.08);
  color:var(--text);
  cursor:pointer;
}

.play{
  margin-top:12px;
  width:100%;
  height:56px;
  font-size:18px;
  font-weight:800;
  border-radius:16px;

  border:none;
  color:white;
  cursor:pointer;
}


.play.disabled{
  opacity: .45;
  filter: grayscale(1);
  cursor: default;

/* 
ESCALADO PARA PANTALLAS GRANDES (AULAS / PIZARRAS DIGITALES)

Se aplica una clase al body según resolución para escalar:

- el popup final (.modal)

Detectado por JS con window.innerWidth
*/

.scale-90  .desktop-wrapper{ transform: scale(0.90); transform-origin:center; }

.scale-90  .modal{ transform: scale(0.90); }
.scale-100 .modal{ transform: scale(1.00); }
.scale-120 .modal{ transform: scale(1.20); }
.scale-140 .modal{ transform: scale(1.40); }
.scale-150 .modal{ transform: scale(1.50); }

const RANKING_KEY = "holamates_rankings";

// Cargar todos los rankings
function loadAllRankings() {
  try {
    const raw = localStorage.getItem(RANKING_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch {
    return {};
  }
}

// Guardar todos los rankings
function saveAllRankings(data) {
  localStorage.setItem(RANKING_KEY, JSON.stringify(data));
}

// Obtener ranking de un challenge
function loadRanking(challengeId) {
  const all = loadAllRankings();
  return all[challengeId] || [];
}

// ¿Entra en Top 5?
function isTop5(challengeId, score) {
  const list = loadRanking(challengeId);

  if (list.length < 5) return true;

  const worst = list[list.length - 1];
  return score >= worst.score;
}

function isTop1(challengeId, score) {
  const list = loadRanking(challengeId);
  if (list.length === 0) return true;
  return score > list[0].score;
}


function insertTop5(challengeId, entry) {
  const all = loadAllRankings();
  const list = all[challengeId] || [];

  list.push(entry);

list.sort((a, b) => {
  if (b.score !== a.score) return b.score - a.score;
  return b.date - a.date; // empate → el más reciente primero
});

  all[challengeId] = list.slice(0, 5);

  saveAllRankings(all);
}

  "scale-90",
  "scale-100",
  "scale-120",
  "scale-140",
  "scale-150",
  "scale-160",
  "scale-200"
];

let currentScaleIndex = 0;

function applyBigScreenScale(){

  const w = window.innerWidth;

  document.body.classList.remove(...scales);

  if(w >= 2500){
    document.body.classList.add("scale-200");
  }
  else if(w >= 2000){
    document.body.classList.add("scale-160");
  }
  else if(w >= 1900){
    document.body.classList.add("scale-150");
  }
  else if(w >= 1700){
    document.body.classList.add("scale-140");
  }
  else if(w >= 1400){
    document.body.classList.add("scale-120");
  }
  else if(w >= 1200){
    document.body.classList.add("scale-100");
  }
  else{
    document.body.classList.add("scale-90");
  }
}

function syncScaleIndex(){
  const current = scales.findIndex(s => document.body.classList.contains(s));
  if(current !== -1){
    currentScaleIndex = current;
  }
}

function applyScaleByIndex(){
  document.body.classList.remove(...scales);
  document.body.classList.add(scales[currentScaleIndex]);
}

function changeScale(direction){
  currentScaleIndex += direction;

  if(currentScaleIndex < 0) currentScaleIndex = 0;
  if(currentScaleIndex >= scales.length) currentScaleIndex = scales.length - 1;

  applyScaleByIndex();
}

function resetScale(){
  applyBigScreenScale();
  syncScaleIndex();
}

function toggleFullscreen(){

  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(err => {
      console.log("Error fullscreen:", err);
    });
  } else {
    document.exitFullscreen();
  }
}

applyBigScreenScale();
syncScaleIndex();

window.addEventListener("resize", () => {
  applyBigScreenScale();
  syncScaleIndex();
});

</script>

</body>
</html>
