function randOp(){

  // 🔴 MODO CON LLEVADA (80% con llevada)
  if (selectedMode === "con") {

    const r = Math.random();

    // 🔥 80% → CON llevada
    if (r < 0.8) {
      let a, b;
      do {
        a = Math.floor(Math.random() * 9) + 1;
        b = Math.floor(Math.random() * 9) + 1;
      } while (a + b < 10);

      return { a, b, revealed: false };
    }

    // 🔹 20% → SIN llevada
    let a, b;
    do {
      a = Math.floor(Math.random() * 9) + 1;
      b = Math.floor(Math.random() * 9) + 1;
    } while (a + b >= 10);

    return { a, b, revealed: false };
  }

  // 🟢 MODO SIN LLEVADA (100% < 10)
  let a, b;
  do {
    a = Math.floor(Math.random() * 9) + 1;
    b = Math.floor(Math.random() * 9) + 1;
  } while (a + b >= 10);

  return { a, b, revealed: false };
}


function currentInterval(){
  const elapsed = Date.now() - startTime;
  if(elapsed >= GAME_TIME) return null;
  const speeds = LEVEL_SPEEDS[selectedLevel];
  const idx = Math.min(Math.floor(elapsed / STEP_TIME), speeds.length - 1);
  return speeds[idx];
}

function render1(){

  rowTop1.innerHTML = "";
  rowBottom1.innerHTML = "";

  const bottom = ops1.slice(-5);
  const top = ops1.slice(0, Math.max(ops1.length - 5, 0));

  function paintRow(rowEl, rowOps){
    const empties = Math.max(0, 5 - rowOps.length);

    for(let i = 0; i < empties; i++){
      const d = document.createElement("div");
      d.className = "card empty";
      rowEl.appendChild(d);
    }

    rowOps.forEach(op => {
      const d = document.createElement("div");

      let cls = "card" + (op.revealed ? " revealed" : "");
      if(op === ops1[0]){
        cls += (phase1 === "ending" || phase1 === "ended") ? " fail" : " active";
      }

      d.className = cls;
      d.textContent = op.revealed
        ? `${op.a}+${op.b}=${op.a + op.b}`
        : `${op.a}+${op.b}`;

      rowEl.appendChild(d);
    });
  }

  paintRow(rowTop1, top.slice(0,5));
  paintRow(rowBottom1, bottom);

  hitsEl1.textContent = hits1;
}

function updateTimeline(){

  const elapsed = Date.now() - startTime;
  const progress = Math.min(elapsed / GAME_TIME, 1);
  const w = (progress * 100) + "%";

  // 🔵 Player 1
  if (phase1 === "playing") {
    timelineBar1.style.width = w;
  }

  // 🔵 Player 2
  if (phase2 === "playing") {
    timelineBar2.style.width = w;
  }

  // 🔁 Sigue animando mientras alguno esté jugando
  if (phase1 === "playing" || phase2 === "playing") {
    requestAnimationFrame(updateTimeline);
  }
}


function scheduleNext1(){

  if (phase1 !== "playing") return;

  const interval = currentInterval();
  if (interval === null){
    endGamePlayer1();
    return;
  }

  clearTimeout(timer1);

  timer1 = setTimeout(() => {

    if (phase1 !== "playing") return;

    if (ops1.length >= MAX_STACK){
      endGamePlayer1();
      return;
    }

   if (ops1.length && !ops1[0].revealed) {
  if (selectedLevel === "training") {
    ops1[0].revealed = true; // training: revela sin esperar
  } else {
    activeWait1++;
    if (activeWait1 >= REVEAL_AFTER) ops1[0].revealed = true;
  }
}

    ops1.push(randOp());
    render1();
    scheduleNext1();

  }, interval);
}


function scheduleNext2(){

  if (phase2 !== "playing") return;

  const interval = currentInterval();
  if (interval === null){
    endGamePlayer2();
    return;
  }

  clearTimeout(timer2);

  timer2 = setTimeout(() => {

    if (phase2 !== "playing") return;

    if (ops2.length >= MAX_STACK){
      endGamePlayer2();
      return;
    }

    if (ops2.length && !ops2[0].revealed) {
  if (selectedLevel === "training") {
    ops2[0].revealed = true;
  } else {
    activeWait2++;
    if (activeWait2 >= REVEAL_AFTER) ops2[0].revealed = true;
  }
}

    ops2.push(randOp());
    render2();
    scheduleNext2();

  }, interval);
}



function press1(n){

  if(phase1 !== "playing" || !ops1.length) return;
  if (inputLocked1) return;

  inputLocked1 = true;

  answer1 += n;
  render1();

  const cur = ops1[0];
  const res = String(cur.a + cur.b);

// ✅ ACIERTO
if(answer1 === res){
  hits1++;
  ops1.shift();
  answer1 = "";
  activeWait1 = 0;

  // 🔥 NUEVO: nunca dejar vacío
  if (ops1.length === 0 && phase1 === "playing") {
    ops1.push(randOp());
  }

  render1();
  inputLocked1 = false;
  return;
}

  // ❌ FALLO
  if(!res.startsWith(answer1)){
    answer1 = "";
    render1();

    ops1.push(randOp());
    render1();
    scheduleNext1();

    if (ops1.length >= MAX_STACK) {
      endGamePlayer1();
      inputLocked1 = false;
      return;
    }
  }

  inputLocked1 = false;
}

if(answer2 === res){

function startGame(){

  if (phase1 !== "idle") return; // 🔒 bloqueo duro

  inputLocked1 = false;   // 🔓 reset seguridad
  inputLocked2 = false;   // 🔓 reset seguridad

  overlay.classList.remove("show");
  clearTimeout(timer1);
  clearTimeout(timer2);

  // ───── RESET PLAYER 1 ─────
  ops1 = [];
  hits1 = 0;
  answer1 = "";
  activeWait1 = 0;
  phase1 = "playing";

  // ───── RESET PLAYER 2 ─────
  ops2 = [];
  hits2 = 0;
  answer2 = "";
  activeWait2 = 0;
  phase2 = "playing";

  startTime = Date.now();

  updatePlayButton();

  playBtn.textContent =
    selectedLevel === "training"
      ? "▶ Entrenamiento"
      : "▶ Play";

// 🔥 Primera operación independiente
ops1.push(randOp());
ops2.push(randOp());


  render1();
  render2();

  scheduleNext1();
  scheduleNext2();

gtag('event','game_start',{game:'sumas_duelo',level:selectedLevel});

  // reset timeline
  timelineBar1.style.width = "0%";
  timelineBar2.style.width = "0%";
  timelineBar1.classList.remove("fail");
  timelineBar2.classList.remove("fail");

  updateTimeline();
}

function endGamePlayer1(){

  if (phase1 !== "playing") return;

  phase1 = "ending";
  timelineBar1.classList.add("fail");
  render1();

  setTimeout(() => {
    phase1 = "ended";
    checkBothFinished();
  }, 500);
}


function endGamePlayer2(){

  if (phase2 !== "playing") return;

  phase2 = "ending";
  timelineBar2.classList.add("fail");
  render2();

  setTimeout(() => {
    phase2 = "ended";
    checkBothFinished();
  }, 500);
}


function checkBothFinished(){
  if (phase1 === "ended" && phase2 === "ended") {
    showFinalModal();
  }
}


function showFinalModal(){

  let winner = null;

  if (hits1 > hits2) winner = 1;
  else if (hits2 > hits1) winner = 2;

  const popupTitle = document.getElementById("popupTitle");
  const scoreMain = document.getElementById("scoreMain");

  popupTitle.textContent = winner
    ? "🏆 Ganador: Jugador " + winner
    : "🤝 Empate";

  scoreMain.innerHTML = `
    <div class="score-block ${winner === 1 ? 'winner' : winner === 2 ? 'loser' : ''}">
      <div class="score-number">${hits1}</div>
      <div class="score-label">Jugador 1</div>
    </div>

    <div class="score-separator">–</div>

    <div class="score-block ${winner === 2 ? 'winner' : winner === 1 ? 'loser' : ''}">
      <div class="score-number">${hits2}</div>
      <div class="score-label">Jugador 2</div>
    </div>
  `;

  popupMessage.innerHTML =
  "Jugador 1: " + mensajeAnimo(hits1) +
  "<br><br>" +
  "Jugador 2: " + mensajeAnimo(hits2);

  overlay.classList.add("show");

  canCloseModal = false;
  setTimeout(() => {
    canCloseModal = true;
  }, 1000);
}


overlay.onclick = e => {
  if (!canCloseModal) return;

  // Solo cerrar si NO estás clicando dentro del modal
  if (!e.target.closest(".modal")) {
    overlay.classList.remove("show");

    phase1 = "idle";
    phase2 = "idle";

    updatePlayButton();
    updatePlayLabel();
  }
};



function buildKeys(){
  const g = document.getElementById("grid");

  function createKey(val){
    const b = document.createElement("button");
    b.className = "key";
    b.textContent = val;

    b.addEventListener("pointerdown", e => {
      b.setPointerCapture(e.pointerId);
      press1(val);
    });

    b.addEventListener("pointerup", e => {
      b.releasePointerCapture(e.pointerId);
    });

    b.addEventListener("pointercancel", e => {
      try { b.releasePointerCapture(e.pointerId); } catch {}
    });

    return b;
  }

  [1,2,3,4,5,6,7,8,9].forEach(n=>{
    g.appendChild(createKey(n));
  });

  const z = createKey("0");
  z.classList.add("zero");
  g.appendChild(z);
}

  const level = levelSelect.value || 'normal';
  const mode = selectedMode || 'sin';

  window.location.href =
  `/sumasdosj.html?level=${encodeURIComponent(level)}&mode=${encodeURIComponent(mode)}`;
}

const scales = [
  "scale-90",
  "scale-100",
  "scale-120",
  "scale-140",
  "scale-150",
  "scale-160",
  "scale-200"
];

let currentScaleIndex = 0;

function applyBigScreenScale(){

  const w = window.innerWidth;

  document.body.classList.remove(...scales);

  if(w >= 2500){
    document.body.classList.add("scale-200");
  }
  else if(w >= 2000){
    document.body.classList.add("scale-160");
  }
  else if(w >= 1900){
    document.body.classList.add("scale-150");
  }
  else if(w >= 1700){
    document.body.classList.add("scale-140");
  }
  else if(w >= 1400){
    document.body.classList.add("scale-120");
  }
  else if(w >= 1200){
    document.body.classList.add("scale-100");
  }
  else{
    document.body.classList.add("scale-90");
  }
}

function syncScaleIndex(){
  const current = scales.findIndex(s => document.body.classList.contains(s));
  if(current !== -1){
    currentScaleIndex = current;
  }
}

function applyScaleByIndex(){
  document.body.classList.remove(...scales);
  document.body.classList.add(scales[currentScaleIndex]);
}

function changeScale(direction){
  currentScaleIndex += direction;

  if(currentScaleIndex < 0) currentScaleIndex = 0;
  if(currentScaleIndex >= scales.length) currentScaleIndex = scales.length - 1;

  applyScaleByIndex();
}

function resetScale(){
  applyBigScreenScale();
  syncScaleIndex();
}

function toggleFullscreen(){

  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(err => {
      console.log("Error fullscreen:", err);
    });
  } else {
    document.exitFullscreen();
  }
}


applyBigScreenScale();
syncScaleIndex();

window.addEventListener("resize", () => {
  applyBigScreenScale();
  syncScaleIndex();
});




</script>
