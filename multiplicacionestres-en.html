/* ───────── HEADER ───────── */

header{
  padding:15px 18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid rgba(255,255,255,.06);
}

.stats{
  display:flex;
  gap:10px;
  align-items:center;
}

.pill{
  background:rgba(255,255,255,.08);
  padding:8px 12px;
  border-radius:999px;
  font-size:13px;
  display:flex;
  align-items:center;
  gap:6px;

  min-width: 0;
  overflow: hidden;
}


select{
  appearance:none;
  -webkit-appearance:none;
  -moz-appearance:none;

  background:transparent;
  border:none;
  outline:none;

  color:var(--text);
  font-weight:600;
  cursor:pointer;

  padding:0 2px;
}

select option{
  background:#1f2937;
  color:#ffffff;
}

/* ───────── CONTENIDO ───────── */

.screen{
  padding:14px 18px;
  flex:1;
  display:flex;
  flex-direction:column;
  gap: 14px; /* controla distancia calc ↔ ? */
}

.calc-screen{
  background:rgba(0,0,0,.35);
  border-radius:20px;
  padding:14px;
  height:120px;

  display:flex;
  justify-content:center;
  align-items:center;

  margin-top: clamp(3px, 0.5vh, 10px);

  box-shadow:inset 0 0 0 1px rgba(255,255,255,.06);
}





.queue{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.row{
  display:flex;
  gap:var(--gap);
}

.card{
  width:var(--card-w);
  height:var(--card-h);
  border-radius:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:800;
  font-size:clamp(16px,4vw,22px);
  background:rgba(255,255,255,.10);
}

.card.empty{
  background:rgba(255,255,255,.04);
}

.card.active{
  background:var(--blue);
}

.card.fail{
  background:var(--fail);
  color:#fff;
}




.card.revealed{
  font-size: clamp(14px, 2.3vw, 18px);  /* ⬆ más grande */
  line-height: 1.05;
  padding: 4px 5px;

  white-space: nowrap;
  letter-spacing: -0.4px;   /* menos apretado */
  transform: scaleX(0.96);  /* casi normal */
}

/* ───────── TECLADO ───────── */

.kbd{
  padding:20px;
  padding-top:6px;
  margin-top:auto;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.grid .zero{
  grid-column:2;
}

button.key{
  height:50px;
  font-size:24px;
  font-weight:800;
  border-radius:20px;
  border:1px solid rgba(255,255,255,.08);
  background:linear-gradient(180deg,var(--btn),var(--btn2));
  color:white;
}

.play{
  margin-top:12px;
  width:100%;
  height:56px;
  font-size:18px;
  font-weight:800;
  border-radius:16px;
  background:linear-gradient(180deg,#2563eb,#1e40af);
  border:none;
  color:white;
  cursor:pointer;
}

.play.disabled{
  opacity: .45;
  filter: grayscale(1);
  cursor: default;
}

.score-block{

/* ───────── MENÚ JUEGOS ───────── */

.game-switch{
  position:relative;
}

#gameBtn{
  background:none;
  border:none;
  color:var(--text);
  font-size:18px;
  font-weight:800;

  display:flex;
  align-items:center;
  gap:4px;
}

#gameBtn .arrow{

  opacity:.6;
}

.game-menu{
  position:absolute;
  top:calc(100% + 8px);
  left:0;

  padding:6px;
  display:none;

}

.game-menu a{
  display:block;

}

.game-menu a:hover{

}

.game-menu .current{

  opacity:.45;
  cursor:default;
}

.game-menu.show{

  /* ───────── LÍNEA DE TIEMPO ───────── */

.timeline{
  position: relative;
  margin-bottom: -4px;
  width: 100%;
  height: 6px;
  background: rgba(255,255,255,.15);
  border-radius: 999px;
  overflow: hidden;
}

.timeline-bar{
  position: absolute;
  right: 0;
  top: 0;
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #4ade80, #22c55e);
  transition: width .1s linear, background .2s;
}

.timeline-bar.fail{
  background: linear-gradient(90deg, #dc2626, #991b1b);
}

/* ───────── SOLO MÓVIL ───────── */

@media (max-width:549px){

  header{

    align-items:center;

  .game-switch{
    grid-column:1;
    grid-row:1;
  }

  .stats{
    display:contents;
  }

    grid-column:2;
    grid-row:1;
    justify-content:center;

    grid-row:1;
    justify-content:center;
  }

    grid-column:3;
    grid-row:2;
    justify-content:center;

    width:100%;

    justify-content:space-between; /* reparte todo el ancho */
    gap:6px;
  }

  .card{
    flex:1;

  /* ───── VARIABLES AJUSTADAS A MÓVIL ───── */

function randOp(){
  const b = Math.floor(Math.random() * 9) + 1;
  const a = selectedTable === "all"
    ? Math.floor(Math.random() * 9) + 1
    : Number(selectedTable);

  return {
    a,
    b,
    revealed: false
  };
}


function currentInterval(){
  const elapsed = Date.now() - startTime;
  if(elapsed >= GAME_TIME) return null;
  const speeds = LEVEL_SPEEDS[selectedLevel];
  const idx = Math.min(Math.floor(elapsed / STEP_TIME), speeds.length - 1);
  return speeds[idx];
}

function render1(){

  rowTop1.innerHTML = "";
  rowBottom1.innerHTML = "";

  const bottom = ops1.slice(-5);
  const top = ops1.slice(0, Math.max(ops1.length - 5, 0));

  function paintRow(rowEl, rowOps){
    const empties = Math.max(0, 5 - rowOps.length);

    for(let i = 0; i < empties; i++){
      const d = document.createElement("div");
      d.className = "card empty";
      rowEl.appendChild(d);
    }

    rowOps.forEach(op => {
      const d = document.createElement("div");

      let cls = "card" + (op.revealed ? " revealed" : "");
      if(op === ops1[0]){
        cls += (phase1 === "ending" || phase1 === "ended") ? " fail" : " active";
      }

      d.className = cls;
      d.textContent = op.revealed
        ? `${op.a}×${op.b}=${op.a * op.b}`
        : `${op.a}×${op.b}`;

      rowEl.appendChild(d);
    });
  }

  paintRow(rowTop1, top.slice(0,5));
  paintRow(rowBottom1, bottom);

  hitsEl1.textContent = hits1;
}

function updateTimeline(){

  const elapsed = Date.now() - startTime;
  const progress = Math.min(elapsed / GAME_TIME, 1);
  const w = (progress * 100) + "%";

  // 🔵 Player 1
  if (phase1 === "playing") {
    timelineBar1.style.width = w;
  }

  // 🔵 Player 2
  if (phase2 === "playing") {
    timelineBar2.style.width = w;
  }

  // 🔵 Player 3  👈 AQUÍ
  if (phase3 === "playing") {
    timelineBar3.style.width = w;
  }

  // 🔁 Sigue animando mientras alguno esté jugando
if (phase1 === "playing" || phase2 === "playing" || phase3 === "playing") {
      requestAnimationFrame(updateTimeline);
  }
}





function press1(n){

  if (phase1 !== "playing" || !ops1.length) return;
  if (inputLocked1) return;

  inputLocked1 = true;

  answer1 += n;
  render1();

  const cur = ops1[0];
  const res = String(cur.a * cur.b);

 // ✅ ACIERTO
if(answer1 === res){
  hits1++;
  ops1.shift();
  answer1 = "";
  activeWait1 = 0;

  // 🔥 NUEVO: nunca dejar vacío
  if (ops1.length === 0 && phase1 === "playing") {
    ops1.push(randOp());

  render1();
  inputLocked1 = false;
  return;

  // ❌ FALLO
  if (!res.startsWith(answer1)){
    answer1 = "";
    render1();

    ops1.push(randOp());
    render1();
    scheduleNext1();

    if (ops1.length >= MAX_STACK){
      inputLocked1 = false;
      endGamePlayer1();
      return;

  }

  inputLocked1 = false;
}

function scheduleNext1(){

  if (phase1 !== "playing") return;

  const interval = currentInterval();
  if (interval === null){
    endGamePlayer1();
    return;
  }

  clearTimeout(timer1);

  timer1 = setTimeout(() => {

    if (phase1 !== "playing") return;

    if (ops1.length >= MAX_STACK){
      endGamePlayer1();
      return;
    }

    if (ops1.length && !ops1[0].revealed) {
  if (selectedLevel === "training") {
    ops1[0].revealed = true;          // 🔵 training: al primer avance
  } else {
    activeWait1++;
    if (activeWait1 >= REVEAL_AFTER) ops1[0].revealed = true; // 🔴 resto: a la tercera
  }
}

    ops1.push(randOp());
    render1();

    scheduleNext1();

  }, interval);
}

function buildKeys(){
  const g = document.getElementById("grid");

  function createKey(val){
    const b = document.createElement("button");
    b.className = "key";
    b.textContent = val;

    b.addEventListener("pointerdown", e => {
      b.setPointerCapture(e.pointerId);
      press1(val);
    });

    b.addEventListener("pointerup", e => {
      b.releasePointerCapture(e.pointerId);
    });

    b.addEventListener("pointercancel", e => {
      try { b.releasePointerCapture(e.pointerId); } catch {}
    });

    return b;
  }

  [1,2,3,4,5,6,7,8,9].forEach(n=>{
    g.appendChild(createKey(n));
  });

  const z = createKey("0");
  z.classList.add("zero");
  g.appendChild(z);
}

let updateResolution;




// ===============================
// 🔍 ESCALADO MANUAL (
// ===============================

const scales = [
  "scale-65",
  "scale-75",
  "scale-85",
  "scale-100",
  "scale-115",
  "scale-120",
  "scale-150"
];

let currentScaleIndex = 3;// empieza en scale-100

function applyScaleByIndex(){

  document.body.classList.remove(...scales);
  document.body.classList.add(scales[currentScaleIndex]);

  if(updateResolution) updateResolution();
}

function changeScale(direction){

  currentScaleIndex += direction;

  if(currentScaleIndex < 0) currentScaleIndex = 0;
  if(currentScaleIndex >= scales.length) currentScaleIndex = scales.length - 1;

  applyScaleByIndex();
}

function resetScale(){

  applyBigScreenScale();
  syncScaleIndex();

  const current = scales.findIndex(s => document.body.classList.contains(s));
  if(current !== -1){
    currentScaleIndex = current;
  }

  if(updateResolution) updateResolution();
}

function syncScaleIndex(){

  const current = scales.findIndex(s => document.body.classList.contains(s));

  if(current !== -1){
    currentScaleIndex = current;
  }
}

applyBigScreenScale();
syncScaleIndex();

window.addEventListener("resize", () => {
  applyBigScreenScale();
  syncScaleIndex();
});

  if (!document.fullscreenElement) {

    document.documentElement.requestFullscreen().catch(err => {

  } else {

  }
}


const positions = [
  "pos-0",
  "pos-1",
  "pos-2",
  "pos-3",
  "pos-4",
  "pos-5"
];

let currentPositionIndex = 0;

function applyPosition(){
  document.body.classList.remove(...positions);
  document.body.classList.add(positions[currentPositionIndex]);
}

function moveDown(){
  currentPositionIndex++;
  if(currentPositionIndex >= positions.length){
    currentPositionIndex = positions.length - 1;
  }
  applyPosition();
}

function moveUp(){
  currentPositionIndex--;
  if(currentPositionIndex < 0){
    currentPositionIndex = 0;
  }
  applyPosition();
}

function moveCenter(){
  currentPositionIndex = 0;
  applyPosition();
}
