<!doctype html>
<html lang="es">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Ranking | HolaMates</title>
<meta name="description" content="Consulta tus mejores resultados en HolaMates. Ranking por juego, nivel, modo y tablas.">
<link rel="canonical" href="https://holamates.com/ranking.html">
<meta name="robots" content="index, follow">

<style>
*{ box-sizing:border-box }

html, body{
  margin:0;
  width:100%;
  overflow-x:hidden;
  background:#0b0f14;
  color:#e8eef7;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
}

body{
  min-height:100vh;
}

/* ===============================
HEADER
================================ */
.app-header{
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:56px;
  z-index:1000;
  background:rgba(11,15,20,.78);
  backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(255,255,255,.06);
}

.app-header-inner{
  height:100%;
  display:flex;
  align-items:center;
  padding:0 18px;
}

.app-header,
.app-header *{
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}

.back-link,
.settings-link{
  width:44px;
  height:44px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0;

  border:none;
  background:none;
  cursor:pointer;

  border-radius:10px;

  transition:
    background .2s ease,
    transform .15s ease;
}

/* 🔥 hover tipo app */
.back-link:hover,
.settings-link:hover{
  background:rgba(255,255,255,.08);
}

/* 🔥 feedback táctil */
.back-link:active,
.settings-link:active{
  transform:scale(.92);
}

/* 🔥 icono flecha */
.icon-back{
  width:22px;
  height:22px;
}

.app-title{
  flex:1;
  text-align:center;
  font-size:17px;
  font-weight:800;
  color:#e8eef7;
  pointer-events:none;
}

/* ===============================
LAYOUT
================================ */
.page{
  min-height:100vh;
  padding:72px 16px 32px;
}

/* ===============================
TROPHY
================================ */
.ranking-trophy{
  display:flex;
  justify-content:center;
  margin:12px 0 24px;
}

.ranking-trophy img{
  width:90px;
  height:auto;
  display:block;
}

/* ===============================
CARD
================================ */
.ranking-card{
  max-width:420px;
  width:100%;
  margin:0 auto;
  padding:0 22px 32px;
  color:#e8eef7;
}

.group{
  margin-bottom:24px;
  text-align:center;
}

.group.center,
.options.center{
  display:flex;
  justify-content:center;
}

.options{
  display:flex;
  gap:12px;
  justify-content:center;
  flex-wrap:wrap;
}

.options.single{
  margin-bottom:20px;
}

.options.wrap{
  flex-wrap:wrap;
}

/* ===============================
BUTTONS
================================ */
button{
  padding:8px 16px;
  border-radius:999px;
  border:none;
  background:#1b2433;
  color:#e8eef7;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
  touch-action:manipulation;
}

button.active{
  background:#2563eb;
}

.back-link,
.settings-link{
  background:none;
}

/* ===============================
GAME SELECTOR
================================ */
.game-selector{
  margin-bottom:34px;
  position:relative;
}

.game-main-btn{
  padding:10px 22px;
  font-size:16px;
  background:#1b2433;
}

.arrow{
  margin-left:8px;
}

.game-dropdown{
  position:absolute;
  top:calc(100% + 10px);
  left:50%;
  transform:translateX(-50%);
  background:#141c2b;
  padding:10px;
  border-radius:18px;
  display:none;
  flex-direction:column;
  gap:8px;
  box-shadow:0 20px 50px rgba(0,0,0,.5);
  z-index:20;
  min-width:180px;
}

.game-dropdown.show{
  display:flex;
}

/* ===============================
ICONOS SELECTOR JUEGOS
================================ */
.game-main-btn{
  padding:10px 18px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}

.game-icon-btn{
  height:32px;
  object-fit:contain;
  display:block;
}

.game-dropdown button{
  display:flex;
  align-items:center;
  justify-content:center;
  padding:10px 14px;
}

.game-dropdown button img{
  height:28px;
  object-fit:contain;
  display:block;
  transition:.15s;
}

.game-dropdown button:hover img{
  transform:scale(1.08);
}



/* ===============================
LISTA
================================ */
.list{
  list-style:none;
  padding:0;
  margin:0;
}

.list li{
  display:flex;
  align-items:center;
  padding:14px 16px;
  margin-bottom:10px;
  border-radius:16px;
  background:#141c2b;
}

.list li.empty-slot{
  background:rgba(255,255,255,.04);
  color:rgba(232,238,247,.35);
  border:1px dashed rgba(255,255,255,.08);
}

.pos{
  width:26px;
  text-align:center;
  font-weight:800;
}

.name{
  flex:1;
  font-weight:700;
}

.score{
  font-weight:800;
}

.gold{ background:#2a3d6f }
.silver{ background:#2a3450 }
.bronze{ background:#2a2f44 }

/* ===============================
RANKING DESACTIVADO
================================ */
.ranking-disabled-card{
  max-width:420px;
  margin:0 auto;
  padding:28px 22px 32px;
  background:#0c121c;
  border:1px solid rgba(255,255,255,.08);
  border-radius:22px;
  text-align:center;
  color:#e8eef7;
}

.ranking-disabled-card h2{
  margin:0 0 14px;
  font-size:22px;
  font-weight:900;
  color:#fde047;
}

.ranking-disabled-card p{
  font-size:15px;
  line-height:1.45;
  opacity:.85;
  margin-bottom:22px;
}

.ranking-disabled-actions{
  display:flex;
  gap:12px;
  justify-content:center;
  align-items:center;
  flex-wrap:wrap;
}

.ranking-disabled-actions input{
  flex:1;
  min-width:180px;
  max-width:220px;
  height:44px;
  padding:0 12px;
  border-radius:12px;
  border:1px solid rgba(0,0,0,.15);
  background:#ffffff;
  color:#111827;
  font-size:14px;
  font-weight:700;
  text-align:center;
}

.ranking-disabled-actions .danger{
  height:44px;
  padding:0 18px;
  border-radius:999px;
  font-size:14px;
  font-weight:900;
  background:#1b2433;
  color:rgba(255,255,255,.45);
  cursor:not-allowed;
  transition:background .15s ease, transform .05s ease;
}

.ranking-disabled-actions .danger:not(:disabled){
  background:#2563eb;
  color:#ffffff;
  cursor:pointer;
}

.ranking-disabled-actions .danger:not(:disabled):active{
  transform:scale(.97);
}

/* ===============================
BLOQUEO SELECCIÓN
================================ */
.ranking-card,
.ranking-card *{
  -webkit-user-select:none;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
}

input{
  -webkit-user-select:text;
  user-select:text;
}

/* ===============================
RESPONSIVE
================================ */
@media (max-width:767px){
  .ranking-trophy{
    margin:8px 0 20px;
  }

  .ranking-trophy img{
    width:64px;
  }
}

@media (min-width:768px){
  .options.wrap{
    flex-wrap:nowrap;
  }

  .options.wrap button{
    min-width:37px;
    padding:8px 12px;
  }
}

@media (min-width:1200px){
  .page{ padding-top:100px; }
}

@media (min-width:1400px){
  .page{ padding-top:150px; }

  .app-header{ height:64px; }
  .app-header-inner{ padding:0 24px; }
  .app-title{ font-size:20px; }

  .back-link,
  .settings-link{
    width:50px;
    height:50px;
  }

  .icon-back{
    width:26px;
    height:26px;
  }
}

@media (min-width:1500px){
  .ranking-card{ max-width:720px; }
  .ranking-trophy img{ width:130px; }

  button{
    font-size:20px;
    padding:15px 25px;
  }

  .list li{
    padding:22px 24px;
    font-size:22px;
  }
}

@media (min-width:1700px){
  .app-header{ height:76px; }
  .app-header-inner{ padding:0 30px; }
  .app-title{ font-size:24px; }

  .back-link,
  .settings-link{
    width:60px;
    height:60px;
  }

  .icon-back{
    width:30px;
    height:30px;
  }
}

@media (min-width:1900px){
  .page{ padding-top:200px; }

  .app-header{ height:90px; }
  .app-title{ font-size:28px; }

  .back-link,
  .settings-link{
    width:70px;
    height:70px;
  }

  .icon-back{
    width:34px;
    height:34px;
  }
}

@media (min-width:2500px){
  .page{ padding-top:280px; }

  .ranking-card{ max-width:920px; }
  .ranking-trophy img{ width:200px; }

  button{
    font-size:30px;
    padding:25px 35px;
  }

  .list li{
    padding:32px 34px;
    font-size:32px;
  }

  .app-header{ height:110px; }
  .app-title{ font-size:34px; }

  .back-link,
  .settings-link{
    width:80px;
    height:80px;
  }

  .icon-back{
    width:40px;
    height:40px;
  }
}
</style>

</head>
<body>

<header class="app-header">
  <div class="app-header-inner">

    <button type="button" class="back-link" aria-label="Volver" id="backBtn">
    <svg class="icon-back" viewBox="0 0 24 24" fill="none">
    <path d="M15 18L9 12L15 6" stroke="#e8eef7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    </button>

    <div class="app-title">Rankings</div>
    <button type="button" class="settings-link" aria-label="Configurar" id="settingsBtn">⚙️</button>
  </div>
</header>

<main class="page">

  <div class="ranking-trophy">
    <img src="/copa_ranking.png" alt="Copa de ranking">
  </div>

  <div class="ranking-card">

    <div id="rankingEnabledView">

      <!-- JUEGO -->
      <div class="group center game-selector">
        <button type="button" class="game-main-btn" id="gameMainBtn">
          <img id="gameIcon" class="game-icon-btn" src="/imagen_multiplicaciones.png" alt="">
          <span class="arrow" id="gameArrow">▾</span>
        </button>

<div class="game-dropdown" id="gameDropdown">
  <button type="button" data-game="suma10">
    <img src="/imagen_suma10.png" alt="Suma10">
  </button>

  <button type="button" data-game="sumas">
    <img src="/imagen_sumas.png" alt="Sumas">
  </button>

  <button type="button" data-game="restas">
    <img src="/imagen_restas.png" alt="Restas">
  </button>

  <button type="button" data-game="tablas">
    <img src="/imagen_multiplicaciones.png" alt="Tablas">
  </button>

  <button type="button" data-game="divisiones">
    <img src="/imagen_divisiones.png" alt="Divisiones">
  </button>
</div>

      </div>

      <!-- NIVEL -->
<div class="group center">
  <div class="options center" id="levelOptions">
    <button type="button" data-level="init"></button>
    <button type="button" data-level="easy"></button>
    <button type="button" data-level="normal"></button>
    <button type="button" data-level="hard"></button>
  </div>
</div>



      <!-- TABLA / DIVISIONES -->
      <div class="group center" id="tableGroup" style="display:none;">
        <div class="options center single">
          <button type="button" id="allTablesBtn"></button>
        </div>

        <div class="options center wrap" id="tableOptions">
          <button type="button" data-table="2">2</button>
          <button type="button" data-table="3">3</button>
          <button type="button" data-table="4">4</button>
          <button type="button" data-table="5">5</button>
          <button type="button" data-table="6">6</button>
          <button type="button" data-table="7">7</button>
          <button type="button" data-table="8">8</button>
          <button type="button" data-table="9">9</button>
        </div>
      </div>

      <!-- RESULTADO -->
      <ul class="list" id="rankingList"></ul>

    </div>

    <!-- RANKING DESACTIVADO -->
    <div id="rankingDisabledView" class="ranking-disabled-card" style="display:none;">

           <h2>
            🇪🇸 Ranking desactivado<br>
            🇬🇧 Ranking disabled<br>
            🇫🇷 Classement désactivé
          </h2>
          
    </div>

  </div>
</main>

<script>
(function () {
  "use strict";

  const state = {
    selectedGame: "tablas",
    selectedLevel: "normal",
    selectedTable: "all",
    ranking: [],
    rankingsDisabled: false,
    gamesOpen: false
  };

const els = {
  backBtn: document.getElementById("backBtn"),
  settingsBtn: document.getElementById("settingsBtn"),
  gameMainBtn: document.getElementById("gameMainBtn"),
  gameLabel: document.getElementById("gameLabel"),
  gameIcon: document.getElementById("gameIcon"),
  gameArrow: document.getElementById("gameArrow"),
  gameDropdown: document.getElementById("gameDropdown"),
  levelOptions: document.getElementById("levelOptions"),
  tableGroup: document.getElementById("tableGroup"),
  tableOptions: document.getElementById("tableOptions"),
  allTablesBtn: document.getElementById("allTablesBtn"),
  rankingList: document.getElementById("rankingList"),
  rankingEnabledView: document.getElementById("rankingEnabledView"),
  rankingDisabledView: document.getElementById("rankingDisabledView")

};

  function restoreFromLastResult() {
    try {
      const raw = localStorage.getItem("holamates_last_result");
      if (!raw) return;

      const last = JSON.parse(raw);
      if (!last) return;

      if (["suma10", "sumas", "tablas", "divisiones", "restas"].includes(last.game)) {
        state.selectedGame = last.game;
      }

if (
  ["init", "easy", "normal", "hard"].includes(last.level) &&
  last.game !== "tablas" &&
  last.game !== "divisiones"
) {
  state.selectedLevel = last.level;
}

      if ((last.game === "tablas" || last.game === "divisiones") && last.table) {
        state.selectedTable = String(last.table);
      }
    } catch (e) {
      console.warn("No se pudo restaurar holamates_last_result", e);
    }
  }

function buildChallengeId() {

  // 🔵 Suma10 → sin nivel
  if (state.selectedGame === "suma10") {
    return "suma10";
  }

// 🟢 Sumas → SIN nivel
if (state.selectedGame === "sumas") {
  return 'sumas';
}

if (state.selectedGame === "restas") {
  return 'restas';
}

  // 🟣 Divisiones → SOLO tabla
  if (state.selectedGame === "divisiones") {
    return `divisiones_${state.selectedTable}`;
  }

  // 🟠 Tablas → SOLO tabla
  if (state.selectedGame === "tablas") {
    return `tablas_${state.selectedTable}`;
  }

  return "";
}

function getGameIcon() {
  switch (state.selectedGame) {
    case "suma10": return "/imagen_suma10.png";
    case "sumas": return "/imagen_sumas.png";
    case "restas": return "/imagen_restas.png";
    case "tablas": return "/imagen_multiplicaciones.png";
    case "divisiones": return "/imagen_divisiones.png";
    default: return "/imagen_multiplicaciones.png";
  }
}

  function loadRanking() {
    try {
      const raw = localStorage.getItem("holamates_rankings");
      const all = raw ? JSON.parse(raw) : {};
      const challengeId = buildChallengeId();

      state.ranking = all[challengeId] || [];
      state.rankingsDisabled =
        state.ranking.length > 0 &&
        state.ranking[0] &&
        state.ranking[0].name === "Ranking desactivado";
    } catch (e) {
      console.error("Error cargando ranking:", e);
      state.ranking = [];
      state.rankingsDisabled = false;
    }
  }

  function closeGames() {
    state.gamesOpen = false;
    els.gameDropdown.classList.remove("show");
    els.gameArrow.textContent = "▾";
  }

  function toggleGames() {
    state.gamesOpen = !state.gamesOpen;
    els.gameDropdown.classList.toggle("show", state.gamesOpen);
    els.gameArrow.textContent = state.gamesOpen ? "▴" : "▾";
  }

function setGame(game) {
  state.selectedGame = game;

  if (game === "suma10") {
    state.selectedTable = "all";
  }

  // 🔥 NUEVO
  if (game === "tablas" || game === "divisiones") {
    state.selectedLevel = "normal"; // valor neutro
  }

  closeGames();
  refresh();
}

  function setLevel(level) {
    state.selectedLevel = level;
    refresh();
  }

  function setTable(table) {
    state.selectedTable = table;
    refresh();
  }

  function updateActiveButtons() {
    els.gameIcon.src = getGameIcon();

    els.levelOptions.querySelectorAll("button").forEach(btn => {
      btn.classList.toggle("active", btn.dataset.level === state.selectedLevel);
    });

    els.tableOptions.querySelectorAll("button").forEach(btn => {
      btn.classList.toggle("active", btn.dataset.table === state.selectedTable);
    });

    els.allTablesBtn.classList.toggle("active", state.selectedTable === "all");
  }

function updateConditionalGroups() {

  const isTablas = state.selectedGame === "tablas";
  const isDivisiones = state.selectedGame === "divisiones";

  const showTable = isTablas || isDivisiones;

  // TABLA
  els.tableGroup.style.display = showTable ? "block" : "none";

  // 🔴 NIVEL → SIEMPRE OCULTO
  const levelGroup = els.levelOptions.closest(".group");
  levelGroup.style.display = "none";

  // TEXTO
  els.allTablesBtn.textContent =
    isDivisiones
      ? "÷ 1, 2, 3 ... 9"
      : "X 1, 2, 3 ... 9";
}


function updateLevelLabels() {

  // 🔴 NO mostrar niveles en estos juegos
  if (
    state.selectedGame === "suma10" ||
    state.selectedGame === "sumas" ||
    state.selectedGame === "restas"
  ) {
    return; // 🚀 CLAVE: no pinta nada
  }

  // SOLO para tablas/divisiones (aunque ahora no lo uses)
  const labels = {
    init: "Iniciación:2",
    easy: "Fácil:3",
    normal: "Medio:4",
    hard: "Difícil:5"
  };

  els.levelOptions.querySelectorAll("button").forEach(btn => {
    btn.textContent = labels[btn.dataset.level] || "";
  });
}



  function renderRankingList() {
    els.rankingList.innerHTML = "";

    for (let i = 0; i < 5; i++) {
      const item = state.ranking[i];
      const li = document.createElement("li");

      if (i === 0 && item) li.classList.add("gold");
      if (i === 1 && item) li.classList.add("silver");
      if (i === 2 && item) li.classList.add("bronze");
      if (!item) li.classList.add("empty-slot");

      const pos = document.createElement("span");
      pos.className = "pos";
      pos.textContent = String(i + 1);

      const name = document.createElement("span");
      name.className = "name";
      name.textContent = item && item.name ? item.name : "—";

      const score = document.createElement("span");
      score.className = "score";
      score.textContent = item && item.score !== undefined && item.score !== null
        ? String(item.score)
        : "—";

      li.appendChild(pos);
      li.appendChild(name);
      li.appendChild(score);
      els.rankingList.appendChild(li);
    }
  }

  function updateDisabledView() {
    if (state.rankingsDisabled) {
      els.rankingEnabledView.style.display = "none";
      els.rankingDisabledView.style.display = "block";
    } else {
      els.rankingEnabledView.style.display = "block";
      els.rankingDisabledView.style.display = "none";
    }
  }

 function refresh() {
  loadRanking();
  updateConditionalGroups();
  updateLevelLabels();
  updateActiveButtons();
  renderRankingList();
  updateDisabledView();
}


  function goBack() {
    const prev = localStorage.getItem("holamates_prev_route");

    if (prev) {
      localStorage.removeItem("holamates_prev_route");
      window.location.href = prev;
      return;
    }

    window.location.href = "/";
  }

  function openConfig() {
    window.location.href = "/ranking-config.html";
  }

  els.backBtn.addEventListener("click", goBack);
  els.settingsBtn.addEventListener("click", openConfig);
  els.gameMainBtn.addEventListener("click", toggleGames);

  els.gameDropdown.querySelectorAll("button[data-game]").forEach(btn => {
    btn.addEventListener("click", function () {
      setGame(btn.dataset.game);
    });
  });

  els.levelOptions.querySelectorAll("button[data-level]").forEach(btn => {
    btn.addEventListener("click", function () {
      setLevel(btn.dataset.level);
    });
  });

  els.allTablesBtn.addEventListener("click", function () {
    setTable("all");
  });

  els.tableOptions.querySelectorAll("button[data-table]").forEach(btn => {
    btn.addEventListener("click", function () {
      setTable(btn.dataset.table);
    });
  });


  document.addEventListener("click", function (e) {
    const inside = e.target.closest(".game-selector");
    if (!inside) closeGames();
  });

  restoreFromLastResult();
  refresh();

  window.addEventListener("pageshow", function () {
    refresh();
  });

})();
</script>

</body>
</html>
