<!doctype html>
<html lang="es">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Configuración ranking | HolaMates</title>

<meta name="description" content="Configura el ranking de HolaMates. Restaurar o desactivar rankings de cálculo mental.">
<link rel="canonical" href="https://holamates.com/ranking-config.html">
<meta name="robots" content="index, follow">

<style>

/* ===============================
BASE
================================ */
*{ box-sizing:border-box }

body{
  margin:0;
  background:#0b0f14;
  color:#e8eef7;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;
}

/* ===============================
HEADER
================================ */
.app-header{
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:56px;
  z-index:1000;
  background:rgba(11,15,20,.78);
  backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(255,255,255,.06);
}

.app-header-inner{
  height:100%;
  display:flex;
  align-items:center;
  padding:0 18px;
}

.back-link{
  width:44px;
  height:44px;
  display:flex;
  align-items:center;
  justify-content:center;

  border:none;
  background:none;
  cursor:pointer;

  border-radius:10px;

  transition:
    background .2s ease,
    transform .15s ease;
}

/* 🔥 hover tipo app */
.back-link:hover{
  background:rgba(255,255,255,.08);
}

/* 🔥 efecto táctil */
.back-link:active{
  transform:scale(.92);
}

/* 🔥 icono */
.icon-back{
  width:22px;
  height:22px;
}

.app-title{
  flex:1;
  text-align:center;
  font-weight:800;
}

.header-spacer{
  width:44px;
  height:44px;
}

/* ===============================
LAYOUT
================================ */
.page{
  min-height:100vh;
  padding:72px 16px 40px;
}

/* ===============================
CONTENT
================================ */
.content{
  max-width:420px;
  margin:0 auto;
}

/* ===============================
INFO
================================ */
.ranking-info{
  text-align:center;
  font-size:13px;
  opacity:.7;
  margin-bottom:28px;
}

/* ===============================
CARDS
================================ */
.cards-container{
  display:flex;
  flex-direction:column;
}

.card{
  background:#0c121c;
  border:1px solid rgba(255,255,255,.08);
  border-radius:22px;
  padding:22px;
  margin-bottom:28px;
}

.card h2{
  text-align:center;
  color:#fde047;
}

.text{
  font-size:14px;
  opacity:.85;
  margin-bottom:18px;
}

/* ===============================
INPUT
================================ */
input{
  width:100%;
  height:48px;
  margin-bottom:16px;
  padding:0 14px;
  border-radius:14px;
  border:1px solid rgba(0,0,0,.15);
  text-align:center;
  font-weight:700;
}

/* ===============================
BUTTON
================================ */
button.danger{
  width:100%;
  height:48px;
  border-radius:16px;
  border:none;
  background:#2563eb;
  color:white;
  font-weight:900;
  cursor:pointer;
}

button:disabled{
  background:#1b2b4a;
  color:rgba(255,255,255,.45);
  cursor:not-allowed;
}

/* ===============================
DESKTOP
================================ */
@media (min-width:900px){
  .content{ max-width:900px }
  .cards-container{ flex-direction:row; gap:28px }
  .card{ flex:1; margin-bottom:0 }
}

/* =================================
   PANTALLAS GRANDES (GLOBAL)
================================= */

@media (min-width:1200px){
  .page{
    padding-top:100px;
  }
}

/* ===============================
   DESKTOP BASE (2 columnas bien)
================================ */
@media (min-width:900px){

  .content{
    max-width:1000px; /* 🔥 más ancho para 2 cards */
  }

  .cards-container{
    display:flex;
    flex-direction:row;
    gap:28px;
  }

  .card{
    flex:1;
    min-width:340px; /* 🔥 evita que se aplasten */
    margin-bottom:0;
  }
}

/* =================================
1400+
================================= */

@media (min-width:1400px){

  .page{
    padding-top:120px;
  }

  .content{
    max-width:1100px; /* 🔥 antes 700 */
  }

  .ranking-info{
    font-size:16px;
  }

  .card{
    padding:28px;
  }

  .card h2{
    font-size:24px;
  }

  .text{
    font-size:16px;
  }

  input{
    height:56px;
    font-size:18px;
  }

  button.danger{
    height:56px;
    font-size:18px;
  }

  /* HEADER */
  .app-header{
    height:64px;
  }

  .app-header-inner{
    padding:0 24px;
  }

  .app-title{
    font-size:20px;
  }

  .back-link,
  .header-spacer{
    width:50px;
    height:50px;
  }

  .icon-back{
  width:26px;
  height:26px;
}
}

/* =================================
1700+
================================= */

@media (min-width:1700px){

  .page{
    padding-top:140px;
  }

  .content{
    max-width:1300px; /* 🔥 antes 900 */
  }

  .ranking-info{
    font-size:18px;
  }

  .card h2{
    font-size:28px;
  }

  .text{
    font-size:18px;
  }

  input{
    height:64px;
    font-size:20px;
  }

  button.danger{
    height:64px;
    font-size:20px;
  }

  /* HEADER */
  .app-header{
    height:76px;
  }

  .app-header-inner{
    padding:0 30px;
  }

  .app-title{
    font-size:24px;
  }

  .back-link,
  .header-spacer{
    width:60px;
    height:60px;
  }

 .icon-back{
  width:30px;
  height:30px;
}

}

/* =================================
1900+
================================= */

@media (min-width:1900px){

  .page{
    padding-top:160px;
  }

  .content{
    max-width:1500px; /* 🔥 antes 1100 */
  }

  .ranking-info{
    font-size:20px;
  }

  .card{
    padding:34px;
  }

  .card h2{
    font-size:32px;
  }

  .text{
    font-size:20px;
  }

  input{
    height:72px;
    font-size:22px;
  }

  button.danger{
    height:72px;
    font-size:22px;
  }

  /* HEADER */
  .app-header{
    height:90px;
  }

  .app-title{
    font-size:28px;
  }

  .back-link,
  .header-spacer{
    width:70px;
    height:70px;
  }

  .back-link{
  font-size:30px;
}
}

/* =================================
2500+
================================= */

@media (min-width:2500px){

  .page{
    padding-top:200px;
  }

  .content{
    max-width:1800px; /* 🔥 antes 1400 */
  }

  .ranking-info{
    font-size:26px;
  }

  .card{
    padding:42px;
  }

  .card h2{
    font-size:40px;
  }

  .text{
    font-size:26px;
  }

  input{
    height:90px;
    font-size:28px;
  }

  button.danger{
    height:90px;
    font-size:28px;
  }

  /* HEADER */
  .app-header{
    height:110px;
  }

  .app-title{
    font-size:34px;
  }

  .back-link,
  .header-spacer{
    width:80px;
    height:80px;
  }

  .icon-back{
  width:40px;
  height:40px;
}
}

/* ===============================
TOAST (mensaje)
================================ */
.toast{
  position:fixed;
  bottom:24px;
  left:50%;
  transform:translateX(-50%) translateY(20px);
  background:#111824;
  color:#e8eef7;
  padding:14px 22px;
  border-radius:14px;
  font-weight:700;
  font-size:14px;
  opacity:0;
  pointer-events:none;
  transition:all .25s ease;
  box-shadow:0 10px 30px rgba(0,0,0,.4);
  z-index:9999;
}

.toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

</style>

</head>

<body>

<header class="app-header">
  <div class="app-header-inner">

    <button class="back-link" onclick="goBack()" aria-label="Volver">
    <svg class="icon-back" viewBox="0 0 24 24" fill="none">
    <path d="M15 18L9 12L15 6" stroke="#e8eef7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    </button>
 
    <div class="app-title">Configuración</div>
    <div class="header-spacer"></div>
  </div>
</header>

<main class="page">

  <div id="toast" class="toast"></div>

  <div class="content">

    <div class="ranking-info">
      El ranking se guarda localmente en este navegador.<br>
      Si usas otro navegador o perfil, será diferente.
    </div>

    <div class="cards-container">

      <!-- RESTAURAR -->
      <section class="card">
        <h2>🔄 Restaurar ranking</h2>

        <p class="text">
          Restaura todos los rankings.<br>
          Esta acción no se puede deshacer.
        </p>

        <input id="restoreInput" placeholder="Escribe RESTAURAR">

        <button id="restoreBtn" class="danger" disabled>
          Restaurar ranking
        </button>
      </section>

      <!-- DESACTIVAR -->
      <section class="card">
        <h2>🚫 Desactivar rankings</h2>

        <p class="text">
          Desactiva todos los rankings del sistema.
        </p>

        <input id="disableInput" placeholder="Escribe DESACTIVAR">

        <button id="disableBtn" class="danger" disabled>
          Desactivar rankings
        </button>
      </section>

    </div>

  </div>
</main>

<script>



/* ===============================
BACK
================================ */
function goBack(){
  history.back();
}

/* ===============================
INPUTS
================================ */
const restoreInput = document.getElementById('restoreInput');
const restoreBtn = document.getElementById('restoreBtn');

const disableInput = document.getElementById('disableInput');
const disableBtn = document.getElementById('disableBtn');

/* ===============================
ENABLE BUTTONS
================================ */
restoreInput.addEventListener('input', () => {
  restoreBtn.disabled =
    restoreInput.value.trim().toUpperCase() !== 'RESTAURAR';
});

disableInput.addEventListener('input', () => {
  disableBtn.disabled =
    disableInput.value.trim().toUpperCase() !== 'DESACTIVAR';
});



/* ===============================
RESTORE
================================ */
restoreBtn.addEventListener('click', () => {

  const raw = localStorage.getItem('holamates_rankings');

  if(!raw){
  restoreInput.value = '';
  showToast("ℹ️ No hay ranking que restaurar");
  return;
}

  localStorage.removeItem('holamates_rankings');
  restoreInput.value = '';
  showToast("✅ Ranking restaurado");
});

/* ===============================
DISABLE
================================ */
disableBtn.addEventListener('click', () => {

  const blocked = Array(5).fill({
    name: 'Ranking desactivado',
    score: 999
  });

  const all = {};

  const levels = ['init','easy','normal','hard'];

  // suma10
  levels.forEach(l=>{
    const map = {
      init:'suma10_iniciacion',
      easy:'suma10_facil',
      normal:'suma10_medio',
      hard:'suma10_dificil'
    };
    all[map[l]] = blocked;
  });

  // tablas
  ['all','2','3','4','5','6','7','8','9'].forEach(t=>{
    levels.forEach(l=>{
      all[`tablas_${t}_${l}`] = blocked;
    });
  });

  // divisiones
  ['all','1','2','3','4','5','6','7','8','9'].forEach(t=>{
    levels.forEach(l=>{
      all[`divisiones_${t}_${l}`] = blocked;
    });
  });

  // sumas / restas
  ['sin','con'].forEach(m=>{
    levels.forEach(l=>{
      all[`sumas_${m}_${l}`] = blocked;
      all[`restas_${m}_${l}`] = blocked;
    });
  });

  localStorage.setItem('holamates_rankings', JSON.stringify(all));
  disableInput.value = '';
  showToast("🚫 Ranking desactivado");
});

/* ===============================
  MENSAJE DESACTIVADO/RESTAURADO
================================ */

 
let toastTimeout;

function showToast(message){
  const toast = document.getElementById("toast");
  toast.textContent = message;

  clearTimeout(toastTimeout);

  toast.classList.add("show");

  toastTimeout = setTimeout(() => {
    toast.classList.remove("show");
  }, 2000);
}

</script>

</body>
</html>
