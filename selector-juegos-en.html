<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Math games for kids | Choose a game | HolaMates</title>

<style>

/* ===============================
   BASE (ANTES :host)
================================ */

body{
  display:flex;
  min-height:100vh;
  width:100%;
  justify-content:center;
  align-items:center;
  background:#0b0f14;
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
}

@media (max-width: 768px){
  body{
    align-items:flex-start;
    padding-top:30px;
  }
}

/* ===============================
   CONTENEDOR PRINCIPAL
================================ */

.selector{
  width:100%;
  display:flex;
  justify-content:center;
  align-items:stretch;
}

/* ===============================
   BLOQUE CENTRAL
================================ */

.selector-inner{
  max-width:250px;
  width:100%;
  padding:28px 22px;
  display:flex;
  flex-direction:column;
  gap:16px;
  text-align:center;
  min-height:70vh;
}

/* ESCRITORIO */
@media (min-width: 1024px){
  .selector-inner{
    max-width:320px;
  }
}

/* ===============================
   IMAGEN TÍTULO
================================ */

.titulo-img{
  width:200px;
  margin:0 auto 10px auto;
  display:block;
}

/* ===============================
   BOTONES
================================ */

.btn{
  width:100%;
  height:52px;
  border-radius:18px;
  border:none;
  font-size:16px;
  font-weight:800;
  color:white;
  cursor:pointer;
  text-decoration:none;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:transform .15s ease, box-shadow .15s ease;
}

.btn:hover{
  transform:scale(1.02);
  box-shadow:0 8px 20px rgba(0,0,0,.35);
}

/* COLORES */

.blue{ background:#2563eb; }
.orange{ background:#d97706; }
.purple{ background:#7e22ce; }
.green{ background:#15803d; }
.red{ background:#b91c1c; }

/* ===============================
   ICONO CERRAR
================================ */

.cerrar-icono{
  width:45px;
  margin:0 auto;
  padding-top:15px;
  cursor:pointer;
  opacity:.7;
  transition:opacity .2s ease, transform .2s ease;
}

.cerrar-icono:hover{
  opacity:1;
  transform:scale(1.05);
}

/* ===============================
   PANTALLAS GRANDES
================================ */

@media (min-width:1400px){
  .selector-inner{ max-width:380px; }
  .titulo-img{ width:220px; }
  .btn{ height:56px; font-size:17px; }
  body{ padding-top:90px; }
}

@media (min-width:1700px){
  .selector-inner{ max-width:440px; }
  .titulo-img{ width:240px; }
  .btn{ height:60px; font-size:22px; }
  body{ padding-top:90px; }
}

@media (min-width:1900px){
  .selector-inner{ max-width:500px; }
  .titulo-img{ width:260px; }
  .btn{ height:72px; font-size:24px; }
  body{ padding-top:100px; }
}

@media (min-width:2500px){
  .selector-inner{ max-width:620px; }
  .titulo-img{ width:350px; }
  .btn{ height:90px; font-size:30px; }
  body{ padding-top:130px; }
}

</style>



</head>

<body>

<section class="selector">

  <div class="selector-inner">

    <img
      src="choose_a_game.svg"
      alt="Choose a game"
      class="titulo-img"
    />

    <a href="suma10-en.html" class="btn blue">
      ▶ Sum 10
    </a>

    <a href="sumas-en.html" class="btn orange">
      ▶ Addition
    </a>

    <a href="restas-en.html" class="btn purple">
      ▶ Subtraction
    </a>

    <a href="multiplicaciones-en.html" class="btn green">
      ▶ Multiplication
    </a>

    <a href="divisiones-en.html" class="btn red">
      ▶ Division
    </a>

    <!-- CLOSE ICON -->
    <a href="index-en.html">
      <img
        src="icono_cerrar.svg"
        alt="Close"
        class="cerrar-icono"
      />
    </a>

  </div>

</section>

</body>
</html>
