<style>
:root{
  --panel:#111824;
  --panel2:#0f1622;
  --text:#e8eef7;
  --muted:#91a4bd;
  --btn:#182235;
  --btn2:#141c2b;
  --shadow:0 18px 60px rgba(0,0,0,.45);
  --radius:18px;
  --active:#2563eb;
  --fail:#dc2626;
  --digit-gap:6px;
}

*{box-sizing:border-box}
html,body{height:100%}

body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;
  background:#0b0f14;
  color:var(--text);
  display:flex;
}


.app{
  width:100%;
  height:100%;
  background:linear-gradient(180deg,var(--panel),var(--panel2));
  display:flex;
  flex-direction:column;
}

@media (min-width:600px){
  body{
    align-items:center;
    justify-content:center;
    padding:18px;
  }
  .app{
    width:min(520px,100%);
    height:auto;
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    border:1px solid rgba(255,255,255,.06);
    overflow:hidden;
  }
}

/* ───────── HEADER / NAV ───────── */

header{
  padding:16px 18px 10px;
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid rgba(255,255,255,.06);
  align-items:center;
}

.stats{
  display:flex;
  gap:10px;
}

.pill{
  font-size:12px;
  color:var(--muted);
  background:rgba(255,255,255,.06);
  padding:6px 10px;
  border-radius:999px;
  display:flex;
  align-items:center;
  gap:6px;
}

select{
  appearance:none;
  -webkit-appearance:none;
  -moz-appearance:none;

  background:transparent;
  border:none;
  outline:none;

  color:var(--text);
  font-weight:600;
  cursor:pointer;

  padding:0 2px;
}

select option{
  background:#1f2937;
  color:#ffffff;
}

select:disabled{
  opacity:.6;
  cursor:default;
}

.player2 select{
  pointer-events:none;
  opacity:.7;
}


/* menú de juegos */

.game-switch{
  position:relative;
}

#gameBtn{
  background:none;
  border:none;
  color:var(--text);
  font-size:18px;
  font-weight:800;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:4px;
}

#gameBtn .arrow{
  font-size:14px;
  opacity:.6;
}

.game-menu{
  position:absolute;
  top:calc(100% + 8px);
  left:0;
  background:#0c121c;
  border-radius:12px;
  padding:6px;
  display:none;
  box-shadow:0 12px 40px rgba(0,0,0,.5);
  z-index:20;
  min-width:140px;
}

.game-menu a{
  display:block;
  padding:8px 12px;
  text-decoration:none;
  color:var(--text);
  font-size:14px;
  border-radius:8px;
  white-space:nowrap;
}

.game-menu a:hover{
  background:rgba(255,255,255,.08);
}

.game-menu .current{
  display:block;
  padding:8px 12px;
  font-size:14px;
  border-radius:8px;
  white-space:nowrap;
  opacity:.45;
  cursor:default;
}
.game-menu.show{ display:block }


/* ───────── iconos multilenguaje ───────── */

.icon-hits{
  width:16px;
  height:16px;
  object-fit:contain;
  opacity:.9;
}

.icon-level{
  width:16px;
  height:16px;
  object-fit:contain;
  opacity:.8;
}

.icon-game-btn{
  height:32px;
  object-fit:contain;
}

.icon-menu{
  height:28px;
  object-fit:contain;
  display:block;
}

.game-menu img{
  transition:.15s;
}

.game-menu a:hover img{
  transform: scale(1.08);
}

.game-menu .current img{
  opacity:.5;
}

/* ───────── LÍNEA DE TIEMPO ───────── */

.timeline{
  position: relative;
  width: 100%;
  height: 6px;
  background: rgba(255,255,255,.15);
  border-radius: 999px;
  overflow: hidden;
  margin-top: -6px;
  margin-bottom: 12px; /* separación con la calculadora */
}

.timeline-bar{
  position: absolute;
  right: 0;           /* anclada a la derecha */
  top: 0;
  height: 100%;
  width: 0%;
background: linear-gradient(90deg, #4ade80, #22c55e);
  transition: width .1s linear, background .2s;
}

/* estado final */
.timeline-bar.fail{
  background: linear-gradient(90deg, #dc2626, #991b1b);
}


/* ───────── PANTALLA ───────── */

.screen{ padding:18px }

.display{
  background:rgba(0,0,0,.25);
  border-radius:14px;
  min-height:90px;
  padding:14px;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

.number{
  display:flex;
  gap:var(--digit-gap);
  width:100%;
}

.digit{
  flex:1;
  min-width:0;   /* importante para flex */
  height:56px;
  border-radius:18px;
  background:rgba(255,255,255,.12);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size: clamp(14px, 2.2vw, 22px);
  white-space: nowrap;
  font-weight:800;
  transition:.15s;
}

.digit.empty{ opacity:.25 }
.digit.active{ background:var(--active); color:#fff }
.digit.fail{ background:var(--fail); color:#fff }

.digit.consume{
  animation:consume .14s ease-out forwards;
}

@keyframes consume{
  to{ transform:scale(.4) translateY(20px); opacity:0 }
}

.display.shake{
  animation:shake .18s linear;
}

@keyframes shake{
  0%{transform:translateX(0)}
  20%{transform:translateX(-4px)}
  40%{transform:translateX(4px)}
  60%{transform:translateX(-3px)}
  80%{transform:translateX(3px)}
  100%{transform:translateX(0)}
}

/* ───────── TECLADO ───────── */

.kbd{
  padding:18px;
  margin-top:auto;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

button.key{
  height:70px;
  font-size:22px;
  font-weight:800;
  border-radius:16px;
  background:linear-gradient(180deg,var(--btn),var(--btn2));
  border:1px solid rgba(255,255,255,.08);
  color:var(--text);
  cursor:pointer;
}

.play{
  margin-top:12px;
  width:100%;
  height:56px;
  font-size:18px;
  font-weight:800;
  border-radius:16px;
  background:linear-gradient(180deg,#2563eb,#1e40af);
  border:none;
  color:white;
  cursor:pointer;
}


.play.disabled{
  opacity: .45;
  filter: grayscale(1);
  cursor: default;
}
 /* ===============================
     BLOQUEO SELECCIÓN iOS (JUEGO)

/* ───────── MODAL ───────── */


.overlay{
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: rgba(0,0,0,.6);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.overlay.show{
  display:flex;
}

.modal{
  background:#0c121c;
  padding:28px 20px 18px;
  border-radius:18px;
  width:min(420px,90%);
  min-height:360px;
  max-height:90vh;
  text-align:center;

  display:flex;
  flex-direction:column;
}

/* CONTENEDOR PRINCIPAL */

.modal-content{
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  gap:18px;
}

/* 1️⃣ ACIERTOS */
.modal-hits{
  font-size:28px;
  font-weight:800;
  margin-top:12px;   /* ⬅️ AQUÍ SUBES / BAJAS */
  margin-bottom:20px;
}

/* 2️⃣ MENSAJE */
.modal-message{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:180px;
}





.modal-icon{
  width:28px;
  height:28px;
  object-fit:contain;
}

.modal-hits{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}

.modal-close-center{
  margin: 12px auto 0;
  width: 44px;
  height: 44px;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:22px;
  border-radius:50%;
  border:none;

  background: rgba(255,255,255,.08);
  color:white;

  cursor:pointer;
  transition:.15s;

  backdrop-filter: blur(6px);
}

.modal-close-center:hover{
  background: rgba(255,255,255,.18);
  transform: scale(1.08);
}

.gifs-row{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:20px;
  flex-wrap:wrap;
}

.gif-block{
  width:180px;
  height:180px;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  border-radius:16px;
}

.gif-block img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;

/* ───────── MARCADOR DUEL ───────── */



.scoreboard{
  margin-top:10px;
  margin-bottom:20px;
  text-align:center;
}

.score-main{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:40px;
  font-size:72px;
  font-weight:900;
  letter-spacing:2px;
  margin-bottom:6px;
}

.score-block{
  display:flex;

  align-items:center;
}

.score-number{
  line-height:1;
}

.score-label{
  font-size:14px;
  margin-top:6px;
  opacity:.7;
}

.score-main .winner{
  color:#4ade80;
}

.score-main .loser{
  opacity:.4;
}

.score-separator{
  font-size:52px;
  opacity:.6;
  transform: translateY(-8px);
}

/* ───────── ANIMACIÓN MARCADOR ───────── */

.modal{
  animation: modalFade .25s ease-out;
}

@keyframes modalFade{
  from{
    opacity:0;
    transform:scale(.92);
  }
  to{
    opacity:1;
    transform:scale(1);
  }
}

.score-main{
  animation: scorePop .35s ease-out;
}

@keyframes scorePop{
  from{
    transform:scale(.8);
    opacity:0;
  }
  to{
    transform:scale(1);
    opacity:1;
  }
}


/* 
ESCALADO PARA PANTALLAS GRANDES (AULAS / PIZARRAS DIGITALES)

Se aplica una clase al body según resolución para escalar:
- el juego (.desktop-wrapper)
- el popup final (.modal)

Detectado por JS con window.innerWidth
*/

.scale-90  .desktop-wrapper{ transform: scale(0.90); transform-origin:center; }
.scale-100 .desktop-wrapper{ transform: scale(1.00); transform-origin:center; }
.scale-120 .desktop-wrapper{ transform: scale(1.20); transform-origin:center; }
.scale-140 .desktop-wrapper{ transform: scale(1.40); transform-origin:center; }
.scale-150 .desktop-wrapper{ transform: scale(1.50); transform-origin:center; }
.scale-160 .desktop-wrapper{ transform: scale(1.60); transform-origin:center; }
.scale-200 .desktop-wrapper{ transform: scale(2.00); transform-origin:center; }

.scale-90  .modal{ transform: scale(0.90); }
.scale-100 .modal{ transform: scale(1.00); }
.scale-120 .modal{ transform: scale(1.20); }
.scale-140 .modal{ transform: scale(1.40); }
.scale-150 .modal{ transform: scale(1.50); }
.scale-160 .modal{ transform: scale(1.60); }
.scale-200 .modal{ transform: scale(2.00); }

.modal{
  transform-origin:center;
}

// 🏆 Ranking helpers (HolaMates Web)

const RANKING_KEY = "holamates_rankings";

// Cargar todos los rankings
function loadAllRankings() {
  try {
    const raw = localStorage.getItem(RANKING_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch {
    return {};
  }
}

// Guardar todos los rankings
function saveAllRankings(data) {
  localStorage.setItem(RANKING_KEY, JSON.stringify(data));
}

// Obtener ranking de un challenge
function loadRanking(challengeId) {
  const all = loadAllRankings();
  return all[challengeId] || [];
}

// ¿Entra en Top 5?
function isTop5(challengeId, score) {
  const list = loadRanking(challengeId);

  if (list.length < 5) return true;

  const worst = list[list.length - 1];
  return score >= worst.score;
}

function isTop1(challengeId, score) {
  const list = loadRanking(challengeId);
  if (list.length === 0) return true;
  return score > list[0].score;
}


function insertTop5(challengeId, entry) {
  const all = loadAllRankings();
  const list = all[challengeId] || [];

  list.push(entry);

list.sort((a, b) => {
  if (b.score !== a.score) return b.score - a.score;
  return b.date - a.date; // empate → el más reciente primero
});

  all[challengeId] = list.slice(0, 5);

  saveAllRankings(all);
}

const scales = [
  "scale-90",
  "scale-100",
  "scale-120",
  "scale-140",
  "scale-150",
  "scale-160",
  "scale-200"
];

let currentScaleIndex = 0;

function applyBigScreenScale(){

  const w = window.innerWidth;

  document.body.classList.remove(...scales);

  if(w >= 2500){
    document.body.classList.add("scale-200");
  }
  else if(w >= 2000){
    document.body.classList.add("scale-160");
  }
  else if(w >= 1900){
    document.body.classList.add("scale-150");
  }
  else if(w >= 1700){
    document.body.classList.add("scale-140");
  }
  else if(w >= 1400){
    document.body.classList.add("scale-120");
  }
  else if(w >= 1200){
    document.body.classList.add("scale-100"); // 👈 EXACTO
  }
  else{
    document.body.classList.add("scale-90");  // 👈 MENOS DE 1200
  }
}

function syncScaleIndex(){
  const current = scales.findIndex(s => document.body.classList.contains(s));
  if(current !== -1){
    currentScaleIndex = current;
  }
}

function applyScaleByIndex(){
  document.body.classList.remove(...scales);
  document.body.classList.add(scales[currentScaleIndex]);
}

function changeScale(direction){
  currentScaleIndex += direction;

  if(currentScaleIndex < 0) currentScaleIndex = 0;
  if(currentScaleIndex >= scales.length) currentScaleIndex = scales.length - 1;

  applyScaleByIndex();
}

function resetScale(){
  applyBigScreenScale();
  syncScaleIndex();
}

function toggleFullscreen(){

  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(err => {
      console.log("Error fullscreen:", err);
    });
  } else {
    document.exitFullscreen();
  }
}
