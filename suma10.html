<style>
:root{
  --panel:#111824;
  --panel2:#0f1622;
  --text:#e8eef7;
  --muted:#91a4bd;
  --btn:#182235;
  --btn2:#141c2b;
  --shadow:0 18px 60px rgba(0,0,0,.45);
  --radius:18px;
  --active:#2563eb;
  --fail:#dc2626;
  --digit-gap:6px;
}

*{box-sizing:border-box}
html,body{height:100%}

body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;
  background:#0b0f14;
  color:var(--text);
  display:flex;
}


.app{
  width:100%;
  height:100%;
  background:linear-gradient(180deg,var(--panel),var(--panel2));
  display:flex;
  flex-direction:column;
}

@media (min-width:600px){
  body{
    align-items:center;
    justify-content:center;
    padding:18px;
  }
  .app{
    width:min(520px,100%);
    height:auto;
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    border:1px solid rgba(255,255,255,.06);
    overflow:hidden;
  }
}

/* ───────── HEADER / NAV ───────── */

header{
  padding:16px 18px 10px;
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid rgba(255,255,255,.06);
  align-items:center;
}

.stats{
  display:flex;
  gap:10px;
}

.pill{
  font-size:12px;
  color:var(--muted);
  background:rgba(255,255,255,.06);
  padding:6px 10px;
  border-radius:999px;
  display:flex;
  align-items:center;
  gap:6px;
}

select{
  appearance:none;
  -webkit-appearance:none;
  -moz-appearance:none;

  background:transparent;
  border:none;
  outline:none;

  color:var(--text);
  font-weight:600;
  cursor:pointer;

  padding:0 2px;
}

select option{
  background:#1f2937;
  color:#ffffff;
}

/* menú de juegos */

.game-switch{
  position: relative;
  margin-left: -6px;
}

#gameBtn{
  background:none;
  border:none;
  color:var(--text);
  font-size:18px;
  font-weight:800;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:4px;
}

#gameBtn .arrow{
  font-size:14px;
  opacity:.6;
}

.game-menu{
  position:absolute;
  top:calc(100% + 8px);
  left:0;
  background:#0c121c;
  border-radius:12px;
  padding:6px;
  display:none;
  box-shadow:0 12px 40px rgba(0,0,0,.5);
  z-index:20;
  min-width:140px;
}

.game-menu a{
  display:block;
  padding:8px 12px;
  text-decoration:none;
  color:var(--text);
  font-size:14px;
  border-radius:8px;
  white-space:nowrap;
}

.game-menu a:hover{
  background:rgba(255,255,255,.08);
}
.game-menu .current{
  display:block;
  padding:8px 12px;
  font-size:14px;
  border-radius:8px;
  white-space:nowrap;
  opacity:.45;
  cursor:default;
}

.game-menu.show{ display:block }

/* ───────── LÍNEA DE TIEMPO ───────── */

.timeline{
  position: relative;
  width: 100%;
  height: 6px;
  background: rgba(255,255,255,.15);
  border-radius: 999px;
  overflow: hidden;
  margin-top: -6px;
  margin-bottom: 12px; /* separación con la calculadora */
}

.timeline-bar{
  position: absolute;
  right: 0;           /* anclada a la derecha */
  top: 0;
  height: 100%;
  width: 0%;
background: linear-gradient(90deg, #4ade80, #22c55e);
  transition: width .1s linear, background .2s;
}

/* estado final */
.timeline-bar.fail{
  background: linear-gradient(90deg, #dc2626, #991b1b);
}


/* ───────── PANTALLA ───────── */

.screen{ padding:18px }

.display{
  background:rgba(0,0,0,.25);
  border-radius:14px;
  min-height:90px;
  padding:14px;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

.number{
  display:flex;
  gap:var(--digit-gap);
  width:100%;
}

.digit{
  flex:1;
  min-width:30px;
  max-width:48px;
  height:56px;
  border-radius:18px;
  background:rgba(255,255,255,.12);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
  font-weight:800;
  transition:.15s;
}

.digit.empty{ opacity:.25 }
.digit.active{ background:var(--active); color:#fff }
.digit.fail{ background:var(--fail); color:#fff }

.digit.consume{
  animation:consume .14s ease-out forwards;
}

@keyframes consume{
  to{ transform:scale(.4) translateY(20px); opacity:0 }
}

.display.shake{
  animation:shake .18s linear;
}

@keyframes shake{
  0%{transform:translateX(0)}
  20%{transform:translateX(-4px)}
  40%{transform:translateX(4px)}
  60%{transform:translateX(-3px)}
  80%{transform:translateX(3px)}
  100%{transform:translateX(0)}
}

/* ───────── TECLADO ───────── */

.kbd{
  padding:18px;
  margin-top:auto;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

button.key{
  height:70px;
  font-size:22px;
  font-weight:800;
  border-radius:16px;
  background:linear-gradient(180deg,var(--btn),var(--btn2));
  border:1px solid rgba(255,255,255,.08);
  color:var(--text);
  cursor:pointer;
}

.play{
  margin-top:12px;
  width:100%;
  height:56px;
  font-size:18px;
  font-weight:800;
  border-radius:16px;
  background:linear-gradient(180deg,#2563eb,#1e40af);
  border:none;
  color:white;
  cursor:pointer;
}


.play.disabled{
  opacity: .45;
  filter: grayscale(1);
  cursor: default;
}

.modal-content{

/* 5️⃣ BOTÓN */

/* TEXTO CERRAR */

<script>
const GAME_TIME = 60000;
const MAX_LEN = 10;

const initialsBox = document.getElementById("initialsBox");
const nameInput = document.getElementById("nameInput");
const initialsOk = document.getElementById("initialsOk");


const tapOutsideText = document.getElementById("tapOutsideText");





let waitingInitials = false;
let pendingChallengeId = null;
let pendingEntry = null;


let START_INTERVAL = 1500;
let END_INTERVAL = 500;

let phase = "idle"; // idle | playing | ending | ended
let value = "";
let hits = 0;
let running = false;
let timer = null;
let startTime = 0;

let inputLocked = false; // 🔒 evita doble hit en ventana de 140ms

const elNumber = document.getElementById("number");
const elHits = document.getElementById("hits");
const overlay = document.getElementById("overlay");
const playBtn = document.getElementById("playBtn");
const levelSelect = document.getElementById("level");

const timelineBar = document.getElementById("timelineBar");


// ───── leer nivel desde URL (query normal) ─────
const params = new URLSearchParams(window.location.search);
const selectorFromUrl = params.get("selector");
let levelFromUrl = params.get("level");

if (selectorFromUrl) {
  localStorage.setItem('holamates_selector_route', decodeURIComponent(selectorFromUrl));
}

if (!levelFromUrl) {
  // intentar recuperar último resultado
  try {
    const last = JSON.parse(localStorage.getItem("holamates_last_result"));
    if (last && last.game === "suma10" && last.level) {
      levelFromUrl = last.level;
    }
  } catch {}
}

if (levelFromUrl) {
  levelSelect.value = levelFromUrl;
  applyLevel();
}






const displayEl = document.getElementById("display");

function updatePlayButton(){
  const disabled = phase !== "idle";
  playBtn.classList.toggle("disabled", disabled);
  playBtn.disabled = disabled;
}

function updateTimeline(){
  if (phase !== "playing") return;

  const elapsed = Date.now() - startTime;
  const progress = Math.min(elapsed / GAME_TIME, 1);

  timelineBar.style.width = (progress * 100) + "%";

  requestAnimationFrame(updateTimeline);
}

function forceFailVisual(){
  const digits = elNumber.querySelectorAll(".digit");

  // quitar active por seguridad
  digits.forEach(d => d.classList.remove("active"));

  // buscar el primer dígito real (no empty)
  for (let d of digits){
    if (!d.classList.contains("empty")){
      d.classList.add("fail");
      break;
    }
  }
}


function applyLevel(){
  const level = levelSelect.value;
  if(level==="init"){START_INTERVAL=3500;END_INTERVAL=3000}
  else if(level==="easy"){START_INTERVAL=1800;END_INTERVAL=900}
  else if(level==="hard"){START_INTERVAL=1200;END_INTERVAL=350}
  else{START_INTERVAL=1500;END_INTERVAL=500}
}

function rand1to9(){
  return String(Math.floor(Math.random()*9)+1);
}

function renderNumber(consuming=false){
  elNumber.innerHTML="";
  const offset = MAX_LEN - value.length;
  for(let i=0;i<MAX_LEN;i++){
    const s=document.createElement("span");
    s.className="digit";
    const idx=i-offset;
    const d=value[idx];
    if(d){
      s.textContent=d;
      if(idx===0){
  if(phase==="ending" || phase==="ended"){
    s.classList.add("fail");
  }else if(phase==="playing"){
    s.classList.add("active");
  }
  if(consuming && phase==="playing"){
    s.classList.add("consume");
  }
}


    }else{
      s.classList.add("empty");
    }
    elNumber.appendChild(s);
  }
}

function updateUI(consuming=false){
  renderNumber(consuming);
  elHits.textContent=hits;
}


function mensajeAnimo(hits){

  // 🔴 MUY BAJO
  if(hits <= 3)  return `<img src="/gifs/gif_pocos_aciertos.gif" loading="eager">`;
  if(hits <= 5)  return `<img src="/gifs/gif_otra_vez.gif" loading="eager">`;

  // 🎯 ESPECIAL BAJO
  if(hits === 6 || hits === 7) return `<img src="/gifs/gif_seis_siete.gif" loading="eager">`;

  // 🟡 INICIO
  if(hits <= 10) return `<img src="/gifs/gif_mapache_aplausos.gif" loading="eager">`;
  if(hits <= 13) return `<img src="/gifs/gif_oveja.gif" loading="eager">`;

  // 😰 BAJO
  if(hits <= 16) return `<img src="/gifs/gif_chico_medio.gif" loading="eager">`;
  if(hits <= 19) return `<img src="/gifs/gif_chico_asustado.gif" loading="eager">`;
  if(hits <= 22) return `<img src="/gifs/gif_chica_asustada.gif" loading="eager">`;

  // 😮 MEJORA
  if(hits <= 25) return `<img src="/gifs/gif_chico_sorprendido.gif" loading="eager">`;
  if(hits <= 28) return `<img src="/gifs/gif_sorprendida.gif" loading="eager">`;
  if(hits <= 31) return `<img src="/gifs/gif_sorprendida2.gif" loading="eager">`;

  // 🟢 NORMAL
  if(hits <= 35) return `<img src="/gifs/gif_ok.gif" loading="eager">`;
  if(hits <= 38) return `<img src="/gifs/gif_okkk_yes.gif" loading="eager">`;
  if(hits <= 41) return `<img src="/gifs/gif_mano_ok.gif" loading="eager">`;

  // 😄 BIEN
  if(hits <= 45) return `<img src="/gifs/gif_contento.gif" loading="eager">`;
  if(hits <= 48) return `<img src="/gifs/gif_contento2.gif" loading="eager">`;

  // 🎯 ESPECIAL
  if(hits === 50) return `<img src="/gifs/gif_lamine.gif" loading="eager">`;

  // 😎 GUAY
  if(hits <= 53) return `<img src="/gifs/gif_chico_guay.gif" loading="eager">`;

  // ⚡ VELOCIDAD
  if(hits <= 56) return `<img src="/gifs/gif_rapido.gif" loading="eager">`;
  if(hits <= 59) return `<img src="/gifs/gif_gato_rapido.gif" loading="eager">`;

  // 🎯 ESPECIAL
  if(hits === 60) return `<img src="/gifs/gif_trump_baile.gif" loading="eager">`;

  if(hits <= 62) return `<img src="/gifs/gif_perro_rapido.gif" loading="eager">`;

  // 🌟 EFECTOS
  if(hits <= 66) return `<img src="/gifs/gif_estrella_fugaz.gif" loading="eager">`;

  // 🎯 ESPECIAL
  if(hits === 67) return `<img src="/gifs/gif_67_original.gif" loading="eager">`;

  if(hits <= 70) return `<img src="/gifs/gif_galaxia.gif" loading="eager">`;

function endGame(){

  if (phase !== "playing") return;

timelineBar.classList.add("fail");


  phase = "ending";
running = false;
clearTimeout(timer);

updateUI();
forceFailVisual();   // 🔥 FORZAR ROJO


  setTimeout(() => {

    phase = "ended";
    forceFailVisual(); 

    const challengeId = getSuma10ChallengeId();
    const entraTop5 = hits >= 6 && isTop5(challengeId, hits);

    let position = null;
    if(entraTop5){
    position = getPosition(challengeId, hits);
    }

    if (entraTop5) {
      pendingChallengeId = challengeId;
      pendingEntry = {
        score: hits,
        date: Date.now(),
        name: ""
      };
    }

    // 🔹 ESTO SIEMPRE
    document.getElementById("goHitsValue").textContent = hits;
    document.getElementById("goMessage").innerHTML = mensajeAnimo(hits);
    overlay.classList.add("show");

    initialsBox.style.display = "none";
    waitingInitials = false;

    // 🔹 SOLO SI ENTRA EN TOP
    if (entraTop5) {
      const esTop1 = isTop1(challengeId, hits);

      waitingInitials = true;
      initialsBox.style.display = "block";

      const medalImg = document.getElementById("medalImg");

      medalImg.style.display = "none";
      medalImg.removeAttribute("src"); // 🔥 clave

      if(position){
      medalImg.src = `/medalla_${position}.png`;
      medalImg.style.display = "block";
      }

      nameInput.value = "";
      nameInput.focus();
      tapOutsideText.style.display = "none";
      playBtn.disabled = true;
    }

  }, 500);
}

function getPosition(challengeId, score){
  const list = loadRanking(challengeId);
  const temp = [...list, {score}];

  temp.sort((a, b) => b.score - a.score);

  return temp.findIndex(e => e.score === score) + 1;
}






function currentInterval(){
  const t=Math.min((Date.now()-startTime)/GAME_TIME,1);
  return START_INTERVAL - t*(START_INTERVAL-END_INTERVAL);
}

function tick(){
  if (phase !== "playing") return;

  if (Date.now() - startTime >= GAME_TIME || value.length >= MAX_LEN) {
    endGame();
    return; // ⛔ nada más puede ejecutarse
  }

  value += rand1to9();
  updateUI();

  timer = setTimeout(tick, currentInterval());
}


function press(n){

  if (phase !== "playing" || inputLocked) return;

  const first = Number(value[0]);

  if (first + n === 10) {

    inputLocked = true; // 🔒 bloquear hasta consumir dígito

    hits++;
    updateUI(true);

    setTimeout(()=>{

      if (phase === "playing") {
        value = value.slice(1) || rand1to9();
        updateUI();
      }

      inputLocked = false; // 🔓 liberar SIEMPRE

    },140);

  } else {

    displayEl.classList.add("shake");
    setTimeout(()=>displayEl.classList.remove("shake"),180);

    value += rand1to9();

    if (value.length >= MAX_LEN || Date.now() - startTime >= GAME_TIME) {
      updateUI();
      endGame();
      return;
    }

    updateUI();

    clearTimeout(timer);
    timer = setTimeout(tick, currentInterval());
  }
}

function startGame(){
  if (phase !== "idle") return;

  gtag('event', 'suma10_play');

  inputLocked = false; // 🔓 reset preventivo

  overlay.classList.remove("show");
  clearTimeout(timer);
  applyLevel();
  value=rand1to9();
  hits=0;
  phase="playing";
  running=true;
  startTime=Date.now();
  updatePlayButton();
  updateUI();
  timer=setTimeout(tick,START_INTERVAL);

timelineBar.style.width = "0%";
timelineBar.classList.remove("fail");
updateTimeline();

}

const RANKING_KEY = "holamates_rankings";

// Cargar todos los rankings
function loadAllRankings() {
  try {
    const raw = localStorage.getItem(RANKING_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch {
    return {};
  }
}

// Guardar todos los rankings
function saveAllRankings(data) {
  localStorage.setItem(RANKING_KEY, JSON.stringify(data));
}

// Obtener ranking de un challenge
function loadRanking(challengeId) {
  const all = loadAllRankings();
  return all[challengeId] || [];
}

// ¿Entra en Top 5?
function isTop5(challengeId, score) {
  const list = loadRanking(challengeId);

  if (list.length < 5) return true;

  const worst = list[list.length - 1];
  return score >= worst.score;
}

function isTop1(challengeId, score) {
  const list = loadRanking(challengeId);
  if (list.length === 0) return true;
  return score > list[0].score;
}


function insertTop5(challengeId, entry) {
  const all = loadAllRankings();
  const list = all[challengeId] || [];

  list.push(entry);

list.sort((a, b) => {
  if (b.score !== a.score) return b.score - a.score;
  return b.date - a.date; // empate → el más reciente primero
});

  all[challengeId] = list.slice(0, 5);

  saveAllRankings(all);
}

const scales = [
  "scale-90",
  "scale-100",
  "scale-120",
  "scale-140",
  "scale-150",
  "scale-160",
  "scale-200"
];

let currentScaleIndex = 0;

function applyBigScreenScale(){

  const w = window.innerWidth;

  // 🔴 CLAVE: si es móvil → NO aplicar nada
  if(w < 1000){
    document.body.classList.remove(...scales);
    return;
  }

  // escritorio → sí aplicar
  document.body.classList.remove(...scales);

  if(w >= 2500){
    document.body.classList.add("scale-200");
  }
  else if(w >= 2000){
    document.body.classList.add("scale-160");
  }
  else if(w >= 1900){
    document.body.classList.add("scale-150");
  }
  else if(w >= 1700){
    document.body.classList.add("scale-140");
  }
  else if(w >= 1400){
    document.body.classList.add("scale-120");
  }
  else if(w >= 1200){
    document.body.classList.add("scale-100");
  }
}

function syncScaleIndex(){
  const current = scales.findIndex(s => document.body.classList.contains(s));
  if(current !== -1){
    currentScaleIndex = current;
  }
}

function applyScaleByIndex(){
  document.body.classList.remove(...scales);
  document.body.classList.add(scales[currentScaleIndex]);
}

function changeScale(direction){
  currentScaleIndex += direction;

  if(currentScaleIndex < 0) currentScaleIndex = 0;
  if(currentScaleIndex >= scales.length) currentScaleIndex = scales.length - 1;

  applyScaleByIndex();
}

function resetScale(){
  applyBigScreenScale();
  syncScaleIndex();
}

function toggleFullscreen(){

  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(err => {
      console.log("Error fullscreen:", err);
    });
  } else {
    document.exitFullscreen();
  }
}

/* INIT */

applyBigScreenScale();
syncScaleIndex();

window.addEventListener("resize", () => {
  applyBigScreenScale();
  syncScaleIndex();
});
