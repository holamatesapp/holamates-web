<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ancho de pantalla</title>
  <style>
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#0b0f14;
      color:#e8eef7;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    }

    .card{
      background:#111824;
      border:1px solid rgba(255,255,255,.08);
      border-radius:20px;
      padding:32px;
      text-align:center;
      box-shadow:0 20px 60px rgba(0,0,0,.35);
      max-width:420px;
      width:90%;
    }

    h1{
      margin:0 0 18px;
      font-size:28px;
    }

    .dato{
      font-size:22px;
      margin:10px 0;
    }

    .mini{
      margin-top:18px;
      color:#9aa8bd;
      font-size:14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Tamaño de pantalla</h1>
    <div class="dato" id="ancho">Ancho: -- px</div>
    <div class="dato" id="alto">Alto: -- px</div>
    <div class="mini">Se actualiza al cambiar el tamaño de la ventana</div>
  </div>

  <script>
    function actualizarMedidas() {
      document.getElementById('ancho').textContent = 'Ancho: ' + window.innerWidth + ' px';
      document.getElementById('alto').textContent = 'Alto: ' + window.innerHeight + ' px';
    }

    actualizarMedidas();
    window.addEventListener('resize', actualizarMedidas);
  </script>
</body>
</html>
