<script>
const MAX_STACK = 10;
const GAME_TIME = 60000;
const STEP_TIME = 15000;
const REVEAL_AFTER = 3;

const LEVEL_SPEEDS = {
  training: [3600, 3200, 2800, 2400],
  init:     [3800, 3400, 3200, 3000],
  easy:     [3000, 2600, 2200, 1800],
  normal:   [2400, 2000, 1600, 1200],
  hard:     [1800, 1400, 1000, 800]
};

let phase = "idle"; // idle | playing | ending | ended
let ops = [], answer = "", hits = 0;
let running = false, timer = null, startTime = 0;
let selectedTable = "all";
let selectedLevel = "normal";

let waitingInitials = false;
let pendingChallengeId = null;
let pendingEntry = null;

function getTablasChallengeId() {
  return `tablas_${selectedTable}_${selectedLevel}`;
}


let activeWait = 0; // ⏳ SOLO para la operación activa

const rowTop = document.getElementById("rowTop");
const rowBottom = document.getElementById("rowBottom");
const hitsEl = document.getElementById("hits");
const overlay = document.getElementById("overlay");
const popupHits = document.getElementById("popupHits");

const tableSelect = document.getElementById("tableSelect");
const levelSelect = document.getElementById("levelSelect");

const timelineBar = document.getElementById("timelineBar");


// ───── leer nivel y tabla desde URL (Hash router Angular) ─────
const params = new URLSearchParams(window.location.search);

const levelFromUrl = params.get("level");
const tableFromUrl = params.get("table");

if (levelFromUrl) {
  levelSelect.value = levelFromUrl;
  selectedLevel = levelFromUrl;
}

if (tableFromUrl) {
  tableSelect.value = tableFromUrl;
  selectedTable = tableFromUrl;
}



const playBtn = document.getElementById("playBtn");

const popupMessage = document.getElementById("popupMessage");
const initialsBox = document.getElementById("initialsBox");
const nameInput = document.getElementById("nameInput");
const initialsOk = document.getElementById("initialsOk");
const tapOutsideText = document.getElementById("tapOutsideText");
const top5Text = document.getElementById("top5Text");


function updatePlayButton(){
  const disabled = phase !== "idle";
  playBtn.classList.toggle("disabled", disabled);
  playBtn.disabled = disabled;
}

function updatePlayLabel(){
  if (selectedLevel === "training") {
    playBtn.textContent = "▶ Entrenar";
  } else {
    playBtn.textContent = "▶ Play";
  }
}




tableSelect.onchange = () => selectedTable = tableSelect.value;
levelSelect.onchange = () => {
  selectedLevel = levelSelect.value;
  updatePlayLabel();
};

function randOp(){
  const b = Math.floor(Math.random() * 9) + 1;
  const a = selectedTable === "all"
    ? Math.floor(Math.random() * 9) + 1
    : Number(selectedTable);

  return {
    a,
    b,
    revealed: false
  };
}


function currentInterval(){
  const elapsed = Date.now() - startTime;
  if(elapsed >= GAME_TIME) return null;
  const speeds = LEVEL_SPEEDS[selectedLevel];
  const idx = Math.min(Math.floor(elapsed / STEP_TIME), speeds.length - 1);
  return speeds[idx];
}

function render(){
  rowTop.innerHTML = "";
  rowBottom.innerHTML = "";

  const bottom = ops.slice(-5);
  const top = ops.slice(0, Math.max(ops.length - 5, 0));

  function paintRow(rowEl, rowOps){
    const empties = Math.max(0, 5 - rowOps.length);

    for(let i = 0; i < empties; i++){
      const d = document.createElement("div");
      d.className = "card empty";
      rowEl.appendChild(d);
    }

    rowOps.forEach(op => {
      const d = document.createElement("div");

let cls = "card" + (op.revealed ? " revealed" : "");
      if(op === ops[0]){
        cls += (phase === "ending" || phase === "ended") ? " fail" : " active";
      }

      d.className = cls;
      d.textContent = op.revealed
        ? `${op.a}×${op.b}=${op.a * op.b}`
        : `${op.a}×${op.b}`;

      rowEl.appendChild(d);
    });
  }

  paintRow(rowTop, top.slice(0,5));
  paintRow(rowBottom, bottom);

  hitsEl.textContent = hits;
}

function updateTimeline(){
  if (phase !== "playing") return;

  const elapsed = Date.now() - startTime;
  const progress = Math.min(elapsed / GAME_TIME, 1);

  timelineBar.style.width = (progress * 100) + "%";

  requestAnimationFrame(updateTimeline);
}


function addOperation(){
  if(!running) return;

  if (ops.length && !ops[0].revealed) {

  if (selectedLevel === "training") {
    // 🔵 En entrenamiento se revela al primer avance
    ops[0].revealed = true;
  } else {
    // 🔴 Resto de niveles: se revela a la tercera espera
    activeWait++;
    if (activeWait >= REVEAL_AFTER) {
      ops[0].revealed = true;
    }
  }

}

  ops.push(randOp());

  // 🔴 MUERTE INMEDIATA AL LLEGAR A 10
  if (ops.length >= MAX_STACK) {
    render();
    return endGame();
  }

  render();
}



function press(n){
  if(!running || !ops.length) return;

  answer += n;
  render();

  const cur = ops[0];
  const res = String(cur.a * cur.b);

  // ✅ acierto → se borra
 if(answer === res){
  hits++;
  ops.shift();
  answer = "";
  activeWait = 0;

  if (ops.length === 0 && running) {
    ops.push(randOp());
  }

  render();
  return;
}

 // ❌ fallo → penaliza SIEMPRE
if(!res.startsWith(answer)){
  answer = "";
  render();
  addOperation();

  // 🔹 RESET DEL TIMER (IGUAL QUE SUMA10)
  clearTimeout(timer);
  const interval = currentInterval();
  if (interval !== null) {
    timer = setTimeout(() => { addOperation(); loop(); }, interval);
  }
}


}


function loop(){
  const interval = currentInterval();
  if(interval === null) return endGame();
  timer = setTimeout(() => { addOperation(); loop(); }, interval);
}

function startGame(){
  if (phase !== "idle") return; // 🔒 bloqueo duro
  overlay.classList.remove("show");
  clearTimeout(timer);
  ops = [];
  hits = 0;
  answer = "";
  activeWait = 0;
  phase = "playing";
  running = true;
  startTime = Date.now();
  updatePlayButton();

  playBtn.textContent =
  selectedLevel === "training"
    ? "▶ Entrenamiento"
    : "▶ Play";

  render();
  addOperation();
  loop();
  gtag('event','game_start',{game:'tablas',level:selectedLevel});

  timelineBar.style.width = "0%";
timelineBar.classList.remove("fail");
updateTimeline();

}

function mensajeAnimo(hits){

  if(hits === 0)  return "No pasa nada 💙 Vamos a intentarlo otra vez";
  if(hits === 1)  return "Buen intento 💪 Cada partida cuenta";
  if(hits === 2)  return "¡Bien! Poco a poco 🙂";

// ─────────────────────────────────────────────
// 🏆 Ranking helpers (HolaMates Web)
// ─────────────────────────────────────────────

const RANKING_KEY = "holamates_rankings";

function loadAllRankings() {
  try {
    const raw = localStorage.getItem(RANKING_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch {
    return {};
  }
}

function saveAllRankings(data) {
  localStorage.setItem(RANKING_KEY, JSON.stringify(data));
}

function loadRanking(challengeId) {
  const all = loadAllRankings();
  return all[challengeId] || [];
}

function isTop5(challengeId, score) {
  const list = loadRanking(challengeId);
  if (list.length < 5) return true;
  return score >= list[list.length - 1].score;
}

function isTop1(challengeId, score) {
  const list = loadRanking(challengeId);
  if (list.length === 0) return true;
  return score > list[0].score;
}

function insertTop5(challengeId, entry) {
  const all = loadAllRankings();
  const list = all[challengeId] || [];

  list.push(entry);
  list.sort((a,b) => {
    if (b.score !== a.score) return b.score - a.score;
    return b.date - a.date;
  });

  all[challengeId] = list.slice(0,5);
  saveAllRankings(all);
}

const scales = [
  "scale-90",
  "scale-100",
  "scale-120",
  "scale-140",
  "scale-150",
  "scale-160",
  "scale-200"
];

let currentScaleIndex = 0;

function applyBigScreenScale(){

  const w = window.innerWidth;

  if(w < 1000){
    document.body.classList.remove(...scales);
    return;
  }

  document.body.classList.remove(...scales);

  if(w >= 2500){
    document.body.classList.add("scale-200");
  }
  else if(w >= 2000){
    document.body.classList.add("scale-160");
  }
  else if(w >= 1900){
    document.body.classList.add("scale-150");
  }
  else if(w >= 1700){
    document.body.classList.add("scale-140");
  }
  else if(w >= 1400){
    document.body.classList.add("scale-120");
  }
  else if(w >= 1200){
    document.body.classList.add("scale-100");
  }
}

function syncScaleIndex(){
  const current = scales.findIndex(s => document.body.classList.contains(s));
  if(current !== -1){
    currentScaleIndex = current;
  }
}

function applyScaleByIndex(){
  document.body.classList.remove(...scales);
  document.body.classList.add(scales[currentScaleIndex]);
}

function changeScale(direction){
  currentScaleIndex += direction;

  if(currentScaleIndex < 0) currentScaleIndex = 0;
  if(currentScaleIndex >= scales.length) currentScaleIndex = scales.length - 1;

  applyScaleByIndex();
}

function resetScale(){
  applyBigScreenScale();
  syncScaleIndex();
}

function toggleFullscreen(){
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(err => {
      console.log("Error fullscreen:", err);
    });
  } else {
    document.exitFullscreen();
  }
}

applyBigScreenScale();
syncScaleIndex();

window.addEventListener("resize", () => {
  applyBigScreenScale();
  syncScaleIndex();
});
