/* ───────── icono multilenguaje ───────── */

  height:16px;

}

}

.game-menu .current img{
  opacity:.5;

/* ───────── LÍNEA DE TIEMPO ───────── */

.timeline{
  position: relative;
  width: 100%;
  height: 6px;
  background: rgba(255,255,255,.15);
  border-radius: 999px;
  overflow: hidden;
  margin-top: -6px;
  margin-bottom: 12px; /* separación con la calculadora */
}

.timeline-bar{
  position: absolute;
  right: 0;           /* anclada a la derecha */
  top: 0;
  height: 100%;
  width: 0%;
background: linear-gradient(90deg, #4ade80, #22c55e);
  transition: width .1s linear, background .2s;
}

/* estado final */
.timeline-bar.fail{
  background: linear-gradient(90deg, #dc2626, #991b1b);
}


/* ───────── PANTALLA ───────── */

.screen{ padding:18px }

.display{
  background:rgba(0,0,0,.25);
  border-radius:14px;
  min-height:90px;
  padding:14px;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

.number{
  display:flex;
  justify-content:flex-end;   /* 👈 ESTO LO ARREGLA */
  gap:var(--digit-gap);
  width:100%;
}

.digit{
  flex:1;
  min-width:0;   /* importante para flex */
  height:56px;
  border-radius:18px;
  background:rgba(255,255,255,.12);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size: clamp(14px, 2.2vw, 22px);
  white-space: nowrap;
  font-weight:800;
  transition:.15s;
}

.digit.empty{ opacity:.25 }
.digit.active{ background:var(--active); color:#fff }
.digit.fail{ background:var(--fail); color:#fff }





/* ───────── TECLADO ───────── */

.kbd{
  padding:18px;
  margin-top:auto;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

button.key{

/* ───────── ANIMACIÓN MARCADOR ───────── */

.modal{
  animation: modalFade .25s ease-out;
}

@keyframes modalFade{
  from{
    opacity:0;
  }
  to{
    opacity:1;
  }
}

.score-main{
  animation: scorePop .35s ease-out;
}

@keyframes scorePop{
  from{
    transform:scale(.8);
    opacity:0;
  }
  to{
    transform:scale(1);
    opacity:1;
  }
}


/* 
ESCALADO PARA PANTALLAS GRANDES (AULAS / PIZARRAS DIGITALES)

Se aplica una clase al body según resolución para escalar:
- el juego (.desktop-wrapper)
- el popup final (.modal)

Detectado por JS con window.innerWidth
*/
.scale-65 .desktop-wrapper{ transform: scale(0.65); transform-origin:center; }
.scale-75 .desktop-wrapper{ transform: scale(.75); transform-origin:center; }
.scale-85 .desktop-wrapper{ transform: scale(0.85); transform-origin:center; }
.scale-100 .desktop-wrapper{ transform: scale(1.00); transform-origin:center; }
.scale-115 .desktop-wrapper{ transform: scale(1.15); transform-origin:center; }
.scale-120 .desktop-wrapper{ transform: scale(1.20); transform-origin:center; }
.scale-150 .desktop-wrapper{ transform: scale(1.50); transform-origin:center; }

.scale-65 .modal{ transform:scale(0.65); }
.scale-75 .modal{ transform:scale(0.75); }
.scale-85 .modal{ transform:scale(0.85); }
.scale-100 .modal{ transform:scale(1.00); }
.scale-115 .modal{ transform:scale(1.15); }
.scale-120 .modal{ transform:scale(1.20); }
.scale-150 .modal{ transform:scale(1.50); }

.modal{
  transform-origin:center;
}

#zoomControls{

}

}

  transform:scale(1.08);

}

}

function buildKeys(){
  const g = document.getElementById("grid");

  [1,2,3,4,5,6,7,8,9].forEach(n=>{
    const b = document.createElement("button");
    b.className = "key";
    b.textContent = n;

    b.addEventListener("pointerdown", e => {
      b.setPointerCapture(e.pointerId);
      press(n);
    });

    b.addEventListener("pointerup", e => {

const RANKING_KEY = "holamates_rankings";

// Cargar todos los rankings
function loadAllRankings() {
  try {
    const raw = localStorage.getItem(RANKING_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch {
    return {};
  }
}

// Guardar todos los rankings
function saveAllRankings(data) {
  localStorage.setItem(RANKING_KEY, JSON.stringify(data));
}

// Obtener ranking de un challenge
function loadRanking(challengeId) {
  const all = loadAllRankings();
  return all[challengeId] || [];
}

// ¿Entra en Top 5?
function isTop5(challengeId, score) {
  const list = loadRanking(challengeId);

  if (list.length < 5) return true;

  const worst = list[list.length - 1];
  return score >= worst.score;
}

function isTop1(challengeId, score) {
  const list = loadRanking(challengeId);
  if (list.length === 0) return true;
  return score > list[0].score;
}


function insertTop5(challengeId, entry) {
  const all = loadAllRankings();
  const list = all[challengeId] || [];

  list.push(entry);

list.sort((a, b) => {
  if (b.score !== a.score) return b.score - a.score;
  return b.date - a.date; // empate → el más reciente primero
});

  all[challengeId] = list.slice(0, 5);

  saveAllRankings(all);
}

let updateResolution; // global






const scales = [
  "scale-65",
  "scale-75",
  "scale-85",
  "scale-100",
  "scale-115",
  "scale-120",
  "scale-150"
];

let currentScaleIndex = 2; // empieza en scale-100

function applyScaleByIndex(){

  document.body.classList.remove(...scales);
  document.body.classList.add(scales[currentScaleIndex]);

  if(updateResolution) updateResolution(); // 👈 CLAVE
}

function changeScale(direction){

  currentScaleIndex += direction;

  if(currentScaleIndex < 0) currentScaleIndex = 0;
  if(currentScaleIndex >= scales.length) currentScaleIndex = scales.length - 1;

  applyScaleByIndex();

}

function resetScale(){

 applyBigScreenScale();
syncScaleIndex(); // 👈 SOLO ESTO

  const current = scales.findIndex(s => document.body.classList.contains(s));
  if(current !== -1){
    currentScaleIndex = current;
  }

  if(updateResolution) updateResolution(); // 👈 CLAVE
}


applyBigScreenScale();
syncScaleIndex(); // 🔥 AÑADE ESTA LÍNEA

window.addEventListener("resize", () => {
  applyBigScreenScale();
  syncScaleIndex(); // 🔥 Y ESTA TAMBIÉN
});


function syncScaleIndex(){

  const current = scales.findIndex(s => document.body.classList.contains(s));

  if(current !== -1){
    currentScaleIndex = current;
  }
}

function toggleFullscreen(){

  if (!document.fullscreenElement) {

      console.log("Error fullscreen:", err);

  } else {

  }
}

  document.body.classList.remove(...positions);

}

  currentPositionIndex++;
  if(currentPositionIndex >= positions.length){
    currentPositionIndex = positions.length - 1;
  }
  applyPosition();
}

function moveUp(){
  currentPositionIndex--;
  if(currentPositionIndex < 0){
    currentPositionIndex = 0;
  }
  applyPosition();
}

  currentPositionIndex = 3;
  applyPosition();
}
